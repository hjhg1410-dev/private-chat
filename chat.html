<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الشات الخاص</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --mine:#2563eb;
      --other:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --border:#334155;
      --danger:#ef4444;
      --ok:#10b981;
      --header:#1e293b;
    }

    *{ box-sizing:border-box; }

    body{
      font-family:tahoma,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    header{
      background:var(--header);
      padding:14px 16px;
      text-align:center;
      font-size:18px;
      border-bottom:1px solid var(--border);
      position:relative;
    }

    .top-actions{
      position:absolute;
      left:12px;
      top:10px;
      display:flex;
      gap:8px;
    }

    .top-btn{
      background:#334155;
      color:#fff;
      border:none;
      border-radius:8px;
      padding:8px 10px;
      cursor:pointer;
      font-size:13px;
      width:auto;
      margin:0;
    }

    #statusBar{
      padding:10px 14px;
      font-size:14px;
      text-align:center;
      border-bottom:1px solid var(--border);
      background:#111827;
      color:var(--muted);
    }

    #messages{
      flex:1;
      overflow:auto;
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .msg{
      max-width:78%;
      padding:10px 12px;
      border-radius:12px;
      background:var(--other);
      align-self:flex-start;
      word-break:break-word;
      border:1px solid rgba(255,255,255,.04);
    }

    .msg.mine{
      background:var(--mine);
      align-self:flex-end;
    }

    .msg .name{
      font-size:12px;
      opacity:.9;
      margin-bottom:5px;
      font-weight:bold;
    }

    .msg .meta{
      font-size:11px;
      opacity:.8;
      margin-top:6px;
    }

    footer{
      display:flex;
      gap:10px;
      padding:10px;
      background:var(--card);
      border-top:1px solid var(--border);
    }

    input{
      flex:1;
      padding:12px;
      border-radius:8px;
      border:none;
      outline:none;
      font-size:15px;
      background:#fff;
      color:#111827;
    }

    button{
      padding:12px 16px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
    }

    #loadingView{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .state-box{
      width:min(560px,100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:24px;
      text-align:center;
    }

    .hidden{
      display:none !important;
    }
  </style>
</head>
<body>

  <header>
    الشات الخاص 🤍
    <div class="top-actions">
      <button id="adminBtn" class="top-btn hidden">لوحة الأدمن</button>
      <button id="logoutBtn" class="top-btn">خروج</button>
    </div>
  </header>

  <div id="statusBar">جاري التحقق من الجلسة...</div>

  <div id="loadingView">
    <div class="state-box">
      <h2>جاري التحميل</h2>
      <p id="loadingText">لحظة من فضلك...</p>
    </div>
  </div>

  <div id="messages" class="hidden"></div>

  <footer id="chatFooter" class="hidden">
    <input id="text" placeholder="اكتب رسالة..." />
    <button id="send">إرسال</button>
  </footer>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient(
        'https://vbwtsnxrshgjqmbgtagw.supabase.co',
        'sb_publishable_esJOtB6hRNf48Uo61txcyg_9F3yolJO'
  )

  const messagesBox = document.getElementById('messages')
  const input = document.getElementById('text')
  const sendBtn = document.getElementById('send')
  const chatFooter = document.getElementById('chatFooter')
  const loadingView = document.getElementById('loadingView')
  const loadingText = document.getElementById('loadingText')
  const statusBar = document.getElementById('statusBar')
  const logoutBtn = document.getElementById('logoutBtn')
  const adminBtn = document.getElementById('adminBtn')

  let currentUser = null
  let currentRole = 'member'
  let currentEmail = ''

  function setStatus(text) {
    statusBar.textContent = text
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;')
  }

  function formatTime(iso) {
    const d = new Date(iso)
    return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' })
  }

  function showChat() {
    loadingView.classList.add('hidden')
    messagesBox.classList.remove('hidden')
    chatFooter.classList.remove('hidden')
  }

  function getDisplayNameFromEmail(email) {
    if (!email) return 'مستخدم'
    return email.split('@')[0]
  }

  async function requireSession() {
    const { data, error } = await supabase.auth.getSession()
    if (error) throw error

    const user = data.session?.user
    if (!user || user.is_anonymous || !user.email) {
      window.location.href = 'login.html'
      throw new Error('لا توجد جلسة تسجيل دخول صالحة')
    }

    return user
  }

  async function getRole(userId) {
    const { data, error } = await supabase
      .from('user_roles')
      .select('role')
      .eq('id', userId)
      .maybeSingle()

    if (error) throw error
    return data?.role || 'member'
  }

  async function loadMessages() {
    const { data, error } = await supabase
      .from('chat_messages')
      .select('*')
      .order('created_at', { ascending: true })

    if (error) throw error

    messagesBox.innerHTML = ''
    data.forEach(renderMessage)
    messagesBox.scrollTop = messagesBox.scrollHeight
  }

  function renderMessage(msg) {
    const div = document.createElement('div')
    div.className = 'msg'
    if (msg.user_id === currentUser.id) {
      div.classList.add('mine')
    }

    const senderName =
      msg.user_id === currentUser.id
        ? 'أنت'
        : (msg.sender_name || 'مستخدم')

    div.innerHTML = `
      <div class="name">${escapeHtml(senderName)}</div>
      <div>${escapeHtml(msg.content || '')}</div>
      <div class="meta">${formatTime(msg.created_at)}</div>
    `

    messagesBox.appendChild(div)
  }

  async function sendMessage() {
    const text = input.value.trim()
    if (!text) return

    sendBtn.disabled = true

    try {
      const { error } = await supabase
        .from('chat_messages')
        .insert({
          user_id: currentUser.id,
          content: text,
          sender_name: getDisplayNameFromEmail(currentEmail)
        })

      if (error) throw error
      input.value = ''
    } catch (err) {
      alert(err.message || 'تعذر إرسال الرسالة')
    } finally {
      sendBtn.disabled = false
    }
  }

  async function initRealtime() {
    supabase
      .channel('chat_messages_live_v2')
      .on(
        'postgres_changes',
        {
          event: 'INSERT',
          schema: 'public',
          table: 'chat_messages'
        },
        (payload) => {
          renderMessage(payload.new)
          messagesBox.scrollTop = messagesBox.scrollHeight
        }
      )
      .subscribe()
  }

  async function logout() {
    await supabase.auth.signOut()
    window.location.href = 'login.html'
  }

  async function init() {
    try {
      currentUser = await requireSession()
      currentEmail = currentUser.email || ''
      currentRole = await getRole(currentUser.id)

      setStatus(`تم تسجيل الدخول: ${currentEmail} | الصلاحية: ${currentRole}`)

      if (currentRole === 'admin') {
        adminBtn.classList.remove('hidden')
      }

      showChat()
      await loadMessages()
      await initRealtime()
    } catch (err) {
      console.error(err)
      loadingText.textContent = err.message || 'حدث خطأ'
    }
  }

  sendBtn.addEventListener('click', sendMessage)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage()
  })

  logoutBtn.addEventListener('click', logout)
  adminBtn.addEventListener('click', () => {
    window.location.href = 'admin.html'
  })

  init()
</script>

</body>
</html>
