<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الأدمن</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --text:#f8fafc;
      --muted:#94a3b8;
      --border:#334155;
      --btn:#2563eb;
      --btn2:#475569;
      --danger:#ef4444;
      --ok:#10b981;
      --warn:#f59e0b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Tahoma,sans-serif;
      min-height:100vh;
      padding:24px;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:20px;
      margin-bottom:16px;
    }

    h1,h2{
      margin-top:0;
    }

    p{
      color:var(--muted);
      line-height:1.8;
    }

    .status{
      padding:12px;
      border-radius:12px;
      margin-top:12px;
      font-weight:bold;
    }

    .ok{
      background:rgba(16,185,129,.15);
      color:#86efac;
      border:1px solid rgba(16,185,129,.3);
    }

    .warn{
      background:rgba(245,158,11,.15);
      color:#fcd34d;
      border:1px solid rgba(245,158,11,.3);
    }

    .danger{
      background:rgba(239,68,68,.15);
      color:#fca5a5;
      border:1px solid rgba(239,68,68,.3);
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      margin-top:10px;
      color:#fff;
      background:var(--btn);
    }

    .secondary{
      background:var(--btn2);
    }

    .danger-btn{
      background:var(--danger);
    }

    .hidden{
      display:none !important;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    .item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      margin-top:12px;
      background:rgba(15,23,42,.45);
    }

    .item-title{
      font-weight:bold;
      margin-bottom:8px;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.8;
    }

    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      margin-left:6px;
      background:rgba(255,255,255,.08);
    }

    pre{
      background:#020617;
      color:#d1d5db;
      padding:14px;
      border-radius:12px;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      direction:ltr;
      text-align:left;
      border:1px solid var(--border);
    }

    @media (max-width:720px){
      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>لوحة الأدمن</h1>
      <p>هذه الصفحة تعمل فقط للمستخدم الذي دوره admin في جدول user_roles.</p>
      <button id="reloadBtn">تحديث اللوحة</button>
      <button id="goChatBtn" class="secondary">الرجوع إلى الشات</button>
      <button id="logoutBtn" class="danger-btn">تسجيل الخروج</button>
    </div>

    <div class="card">
      <h2>الحالة الحالية</h2>
      <div id="statusBox" class="status warn">جاري التحقق...</div>
    </div>

    <div class="card">
      <h2>بيانات التطوير</h2>
      <pre id="debugBox">جاهز...</pre>
    </div>

    <div id="notAdminBox" class="card hidden">
      <h2>الدخول مرفوض</h2>
      <div class="status danger">هذا الحساب ليس أدمن.</div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="card">
        <h2>معلومات الحساب الحالي</h2>
        <div id="meBox"></div>
      </div>

      <div class="card">
        <h2>المستخدمون المسجلون في الأدوار</h2>
        <div id="rolesList"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
        'https://vbwtsnxrshgjqmbgtagw.supabase.co',
        'sb_publishable_esJOtB6hRNf48Uo61txcyg_9F3yolJO'
    )

    const statusBox = document.getElementById('statusBox')
    const debugBox = document.getElementById('debugBox')
    const notAdminBox = document.getElementById('notAdminBox')
    const adminPanel = document.getElementById('adminPanel')
    const meBox = document.getElementById('meBox')
    const rolesList = document.getElementById('rolesList')

    const reloadBtn = document.getElementById('reloadBtn')
    const goChatBtn = document.getElementById('goChatBtn')
    const logoutBtn = document.getElementById('logoutBtn')

    let currentUser = null
    let currentRole = 'member'

    function setStatus(text, type = 'warn') {
      statusBox.className = `status ${type}`
      statusBox.textContent = text
    }

    function showDebug(data) {
      debugBox.textContent =
        typeof data === 'string'
          ? data
          : JSON.stringify(data, null, 2)
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;')
    }

    async function requireSession() {
      const { data, error } = await supabase.auth.getSession()
      if (error) throw error

      const user = data.session?.user
      if (!user || user.is_anonymous || !user.email) {
        window.location.href = 'login.html'
        throw new Error('لا توجد جلسة صالحة')
      }

      return user
    }

    async function getRole(userId) {
      const { data, error } = await supabase
        .from('user_roles')
        .select('role')
        .eq('id', userId)
        .maybeSingle()

      if (error) throw error
      return data?.role || 'member'
    }

    async function loadRoles() {
      const { data, error } = await supabase
        .from('user_roles')
        .select('*')
        .order('role', { ascending: true })

      if (error) throw error

      rolesList.innerHTML = ''

      if (!data || data.length === 0) {
        rolesList.innerHTML = `
          <div class="item">
            <div class="meta">لا توجد بيانات في user_roles.</div>
          </div>
        `
        return
      }

      data.forEach((row) => {
        const item = document.createElement('div')
        item.className = 'item'
        item.innerHTML = `
          <div class="item-title">
            ${escapeHtml(row.id)}
            <span class="badge">${escapeHtml(row.role)}</span>
          </div>
          <div class="meta">
            user_id: ${escapeHtml(row.id)}<br>
            role: ${escapeHtml(row.role)}
          </div>
        `
        rolesList.appendChild(item)
      })
    }

    function renderMe() {
      meBox.innerHTML = `
        <div class="item">
          <div class="item-title">
            ${escapeHtml(currentUser.email || 'بدون إيميل')}
            <span class="badge">${escapeHtml(currentRole)}</span>
          </div>
          <div class="meta">
            id: ${escapeHtml(currentUser.id)}<br>
            email: ${escapeHtml(currentUser.email || '')}<br>
            is_anonymous: ${String(currentUser.is_anonymous)}<br>
            last_sign_in_at: ${escapeHtml(currentUser.last_sign_in_at || '')}
          </div>
        </div>
      `
    }

    async function runPage() {
      notAdminBox.classList.add('hidden')
      adminPanel.classList.add('hidden')
      setStatus('جاري التحقق من الجلسة والصلاحية...', 'warn')

      try {
        currentUser = await requireSession()
        currentRole = await getRole(currentUser.id)

        showDebug({
          step: 'admin_auth_check',
          user: currentUser,
          role: currentRole
        })

        if (currentRole !== 'admin') {
          notAdminBox.classList.remove('hidden')
          setStatus('هذا الحساب ليس أدمن', 'danger')
          return
        }

        setStatus('تم التحقق من الأدمن بنجاح', 'ok')
        adminPanel.classList.remove('hidden')

        renderMe()
        await loadRoles()
      } catch (err) {
        console.error(err)
        setStatus(err.message || 'حدث خطأ غير متوقع', 'danger')
        showDebug({
          step: 'error',
          message: err.message || String(err)
        })
      }
    }

    async function logout() {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    }

    reloadBtn.addEventListener('click', runPage)
    goChatBtn.addEventListener('click', () => {
      window.location.href = 'chat.html'
    })
    logoutBtn.addEventListener('click', logout)

    runPage()
  </script>
</body>
</html>
