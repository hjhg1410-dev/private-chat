<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>اختبار الشات الثابت</title>

<style>
:root{
  --bg:#0f172a;
  --header:#1e293b;
  --footer:#1e293b;
  --mine:#2563eb;
  --other:#334155;
  --border:#475569;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:tahoma,sans-serif;
  color:#fff;
  -webkit-text-size-adjust:100%;
}

body{
  position:fixed;
  inset:0;
}

.app{
  position:fixed;
  inset:0;
  display:grid;
  grid-template-rows:auto 1fr auto;
  width:100%;
  height:100dvh;
  background:var(--bg);
  overflow:hidden;
}

/* header */
header{
  background:var(--header);
  border-bottom:1px solid var(--border);
  padding-top:var(--safe-top);
  z-index:10;
}

.header-inner{
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 14px;
  font-size:18px;
}

/* messages */
.messages{
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:12px 10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:var(--bg);
  -webkit-overflow-scrolling:touch;
}

.msg{
  max-width:80%;
  padding:10px 12px;
  border-radius:12px;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.msg.me{
  background:var(--mine);
  align-self:flex-end;
}

.msg.other{
  background:var(--other);
  align-self:flex-start;
}

/* footer */
footer{
  background:var(--footer);
  border-top:1px solid var(--border);
  padding:10px 10px calc(10px + var(--safe-bottom));
  display:flex;
  gap:8px;
  align-items:center;
  z-index:10;
}

input{
  flex:1;
  min-width:0;
  height:48px;
  border:none;
  outline:none;
  border-radius:10px;
  padding:12px;
  font-size:16px;
  background:#fff;
  color:#111827;
}

button{
  flex:0 0 auto;
  min-width:72px;
  height:48px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-size:15px;
  cursor:pointer;
}

@media (max-width:420px){
  .header-inner{
    min-height:56px;
    font-size:17px;
  }

  input,button{
    height:46px;
  }

  button{
    min-width:68px;
  }
}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="header-inner">الشات الخاص 🤍</div>
  </header>

  <div class="messages" id="messages">
    <div class="msg other">هذه رسالة تجريبية من الطرف الآخر</div>
    <div class="msg me">وهذه رسالة منك</div>
    <div class="msg other">اختبر الآن ثبات الهيدر والفوتر.</div>
    <div class="msg me">واختبر أيضًا الكيبورد والتمرير.</div>
    <div class="msg other">إذا ثبتت هذه النسخة، سنبني عليها الشات الحقيقي.</div>
  </div>

  <footer>
    <input id="text" type="text" placeholder="اكتب رسالة..." autocomplete="off" />
    <button id="sendBtn" type="button">إرسال</button>
  </footer>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('text');
const sendBtn = document.getElementById('sendBtn');

function send(){
  const text = input.value.trim();
  if (!text) return;

  const div = document.createElement('div');
  div.className = 'msg me';
  div.textContent = text;
  messages.appendChild(div);
  input.value = '';
  messages.scrollTop = messages.scrollHeight;
}

sendBtn.addEventListener('click', send);

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send();
});
</script>

</body>
</html>
