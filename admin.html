<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الأدمن</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --text:#f8fafc;
      --muted:#94a3b8;
      --border:#334155;
      --btn:#2563eb;
      --btn2:#475569;
      --danger:#ef4444;
      --ok:#10b981;
      --warn:#f59e0b;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Tahoma,sans-serif;
      min-height:100vh;
      padding:24px;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:20px;
      margin-bottom:16px;
    }

    h1,h2{
      margin-top:0;
    }

    p{
      color:var(--muted);
      line-height:1.8;
    }

    .status{
      padding:12px;
      border-radius:12px;
      margin-top:12px;
      font-weight:bold;
    }

    .ok{
      background:rgba(16,185,129,.15);
      color:#86efac;
      border:1px solid rgba(16,185,129,.3);
    }

    .warn{
      background:rgba(245,158,11,.15);
      color:#fcd34d;
      border:1px solid rgba(245,158,11,.3);
    }

    .danger{
      background:rgba(239,68,68,.15);
      color:#fca5a5;
      border:1px solid rgba(239,68,68,.3);
    }

    button, select, input{
      width:100%;
      padding:12px;
      border-radius:10px;
      font-size:16px;
      margin-top:10px;
    }

    button{
      border:none;
      cursor:pointer;
      color:#fff;
      background:var(--btn);
    }

    input, select{
      background:#0b1220;
      color:#fff;
      border:1px solid var(--border);
      outline:none;
    }

    .secondary{
      background:var(--btn2);
    }

    .danger-btn{
      background:var(--danger);
    }

    .hidden{
      display:none !important;
    }

    .item{
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      margin-top:12px;
      background:rgba(15,23,42,.45);
    }

    .item-title{
      font-weight:bold;
      margin-bottom:8px;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.8;
    }

    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      font-size:12px;
      margin-left:6px;
      background:rgba(255,255,255,.08);
    }

    pre{
      background:#020617;
      color:#d1d5db;
      padding:14px;
      border-radius:12px;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      direction:ltr;
      text-align:left;
      border:1px solid var(--border);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    @media (max-width: 768px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>لوحة الأدمن</h1>
      <p>إدارة المستخدمين والأدوار وإنشاء حسابات جديدة.</p>
      <button id="reloadBtn">تحديث اللوحة</button>
      <button id="goChatBtn" class="secondary">الرجوع إلى الشات</button>
      <button id="logoutBtn" class="danger-btn">تسجيل الخروج</button>
    </div>

    <div class="card">
      <h2>الحالة الحالية</h2>
      <div id="statusBox" class="status warn">جاري التحقق...</div>
    </div>

    <div class="card">
      <h2>بيانات التطوير</h2>
      <pre id="debugBox">جاهز...</pre>
    </div>

    <div id="notAdminBox" class="card hidden">
      <h2>الدخول مرفوض</h2>
      <div class="status danger">هذا الحساب ليس أدمن.</div>
    </div>

    <div id="adminPanel" class="hidden">
      <div class="grid">
        <div>
          <div class="card">
            <h2>الحساب الحالي</h2>
            <div id="meBox"></div>
          </div>

          <div class="card">
            <h2>إنشاء مستخدم جديد</h2>
            <input id="newEmail" type="email" placeholder="user@example.com" />
            <input id="newPassword" type="password" placeholder="كلمة المرور" />
            <select id="newRole">
              <option value="member">member</option>
              <option value="admin">admin</option>
            </select>
            <button id="createUserBtn">إنشاء المستخدم</button>
          </div>
        </div>

        <div class="card">
          <h2>المستخدمون</h2>
          <div id="usersList"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

    const supabase = createClient(
      'https://vbwtsnxrshgjqmbgtagw.supabase.co',
      'sb_publishable_esJOtB6hRNf48Uo61txcyg_9F3yolJO'
    )

    const statusBox = document.getElementById('statusBox')
    const debugBox = document.getElementById('debugBox')
    const notAdminBox = document.getElementById('notAdminBox')
    const adminPanel = document.getElementById('adminPanel')
    const meBox = document.getElementById('meBox')
    const usersList = document.getElementById('usersList')

    const reloadBtn = document.getElementById('reloadBtn')
    const goChatBtn = document.getElementById('goChatBtn')
    const logoutBtn = document.getElementById('logoutBtn')

    const newEmail = document.getElementById('newEmail')
    const newPassword = document.getElementById('newPassword')
    const newRole = document.getElementById('newRole')
    const createUserBtn = document.getElementById('createUserBtn')

    let currentUser = null
    let currentRole = 'member'

    function setStatus(text, type = 'warn') {
      statusBox.className = `status ${type}`
      statusBox.textContent = text
    }

    function showDebug(data) {
      debugBox.textContent =
        typeof data === 'string'
          ? data
          : JSON.stringify(data, null, 2)
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;')
    }

    async function requireSession() {
      const { data, error } = await supabase.auth.getSession()
      if (error) throw error

      const user = data.session?.user
      if (!user || user.is_anonymous || !user.email) {
        window.location.href = 'login.html'
        throw new Error('لا توجد جلسة صالحة')
      }

      return user
    }

    async function getRole(userId) {
      const { data, error } = await supabase
        .from('user_roles')
        .select('role')
        .eq('id', userId)
        .maybeSingle()

      if (error) throw error
      return data?.role || 'member'
    }

    async function loadUsers() {
      const { data, error } = await supabase
        .from('admin_users_view')
        .select('*')
        .order('created_at', { ascending: true })

      if (error) throw error
      return data || []
    }

    async function setUserRole(userId, role) {
      const { data: existing, error: existingError } = await supabase
        .from('user_roles')
        .select('id')
        .eq('id', userId)
        .maybeSingle()

      if (existingError) throw existingError

      if (existing) {
        const { error } = await supabase
          .from('user_roles')
          .update({ role })
          .eq('id', userId)

        if (error) throw error
      } else {
        const { error } = await supabase
          .from('user_roles')
          .insert({ id: userId, role })

        if (error) throw error
      }
    }

    async function createUserByAdmin(email, password, role) {
      const { data, error } = await supabase.functions.invoke('create-user-by-admin', {
        body: {
          email,
          password
        }
      })

      if (error) throw error
      if (data?.error) throw new Error(data.error)

      const createdUserId = data?.user?.id
      if (!createdUserId) {
        throw new Error('تم إنشاء المستخدم لكن لم يصل id')
      }

      await setUserRole(createdUserId, role)
      return data
    }

    function renderMe() {
      meBox.innerHTML = `
        <div class="item">
          <div class="item-title">
            ${escapeHtml(currentUser.email || 'بدون إيميل')}
            <span class="badge">${escapeHtml(currentRole)}</span>
          </div>
          <div class="meta">
            id: ${escapeHtml(currentUser.id)}<br>
            email: ${escapeHtml(currentUser.email || '')}<br>
            last_sign_in_at: ${escapeHtml(currentUser.last_sign_in_at || '')}
          </div>
        </div>
      `
    }

    async function renderUsers() {
      const users = await loadUsers()

      if (!users.length) {
        usersList.innerHTML = `
          <div class="item">
            <div class="meta">لا يوجد مستخدمون.</div>
          </div>
        `
        return
      }

      usersList.innerHTML = ''

      users.forEach((user) => {
        const item = document.createElement('div')
        item.className = 'item'

        const isMe = user.id === currentUser.id

        item.innerHTML = `
          <div class="item-title">
            ${escapeHtml(user.email || 'بدون إيميل')}
            <span class="badge">${escapeHtml(user.role)}</span>
            ${isMe ? '<span class="badge">أنت</span>' : ''}
          </div>
          <div class="meta">
            id: ${escapeHtml(user.id)}<br>
            created_at: ${escapeHtml(user.created_at || '')}<br>
            last_sign_in_at: ${escapeHtml(user.last_sign_in_at || '')}
          </div>
          <select class="roleSelect">
            <option value="member" ${user.role === 'member' ? 'selected' : ''}>member</option>
            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>admin</option>
          </select>
          <button class="saveRoleBtn">حفظ الدور</button>
        `

        const roleSelect = item.querySelector('.roleSelect')
        const saveRoleBtn = item.querySelector('.saveRoleBtn')

        saveRoleBtn.addEventListener('click', async () => {
          try {
            saveRoleBtn.disabled = true
            setStatus('جاري حفظ الدور...', 'warn')

            await setUserRole(user.id, roleSelect.value)

            setStatus('تم حفظ الدور بنجاح', 'ok')
            await runPage()
          } catch (err) {
            console.error(err)
            setStatus(err.message || 'تعذر حفظ الدور', 'danger')
          } finally {
            saveRoleBtn.disabled = false
          }
        })

        usersList.appendChild(item)
      })
    }

    async function handleCreateUser() {
      const email = newEmail.value.trim().toLowerCase()
      const password = newPassword.value.trim()
      const role = newRole.value

      if (!email || !password) {
        setStatus('أدخل الإيميل وكلمة المرور', 'danger')
        return
      }

      if (password.length < 8) {
        setStatus('كلمة المرور يجب أن تكون 8 أحرف أو أكثر', 'danger')
        return
      }

      createUserBtn.disabled = true

      try {
        setStatus('جاري إنشاء المستخدم...', 'warn')

        const result = await createUserByAdmin(email, password, role)

        setStatus(`تم إنشاء المستخدم بنجاح: ${email}`, 'ok')
        showDebug({
          step: 'create_user_success',
          result
        })

        newEmail.value = ''
        newPassword.value = ''
        newRole.value = 'member'

        await runPage()
      } catch (err) {
        console.error(err)
        setStatus(err.message || 'تعذر إنشاء المستخدم', 'danger')
        showDebug({
          step: 'create_user_error',
          message: err.message || String(err)
        })
      } finally {
        createUserBtn.disabled = false
      }
    }

    async function runPage() {
      notAdminBox.classList.add('hidden')
      adminPanel.classList.add('hidden')
      setStatus('جاري التحقق من الجلسة والصلاحية...', 'warn')

      try {
        currentUser = await requireSession()
        currentRole = await getRole(currentUser.id)

        showDebug({
          step: 'admin_auth_check',
          user: currentUser,
          role: currentRole
        })

        if (currentRole !== 'admin') {
          notAdminBox.classList.remove('hidden')
          setStatus('هذا الحساب ليس أدمن', 'danger')
          return
        }

        setStatus('تم التحقق من الأدمن بنجاح', 'ok')
        adminPanel.classList.remove('hidden')

        renderMe()
        await renderUsers()
      } catch (err) {
        console.error(err)
        setStatus(err.message || 'حدث خطأ غير متوقع', 'danger')
        showDebug({
          step: 'error',
          message: err.message || String(err)
        })
      }
    }

    async function logout() {
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    }

    reloadBtn.addEventListener('click', runPage)
    goChatBtn.addEventListener('click', () => {
      window.location.href = 'chat.html'
    })
    logoutBtn.addEventListener('click', logout)
    createUserBtn.addEventListener('click', handleCreateUser)

    runPage()
  </script>
</body>
</html>
