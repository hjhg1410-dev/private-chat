<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>اختبار الشات</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

html,body{
height:100%;
font-family:tahoma;
background:#0f172a;
color:white;
}

.app{
display:flex;
flex-direction:column;
height:100dvh;
}

/* HEADER */

header{
flex-shrink:0;
height:60px;
background:#1e293b;
border-bottom:1px solid #334155;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}

/* MESSAGES */

.messages{
flex:1;
overflow-y:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
}

/* BUBBLES */

.msg{
max-width:80%;
padding:10px 12px;
border-radius:12px;
word-break:break-word;
}

.msg.me{
background:#2563eb;
align-self:flex-end;
}

.msg.other{
background:#334155;
align-self:flex-start;
}

/* FOOTER */

footer{
flex-shrink:0;
background:#1e293b;
border-top:1px solid #334155;
padding:10px;
display:flex;
gap:8px;
}

input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
padding:12px 16px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
font-size:15px;
}

</style>
</head>

<body>

<div class="app">

<header>
الشات الخاص 🤍
</header>

<div class="messages" id="messages">

<div class="msg other">هذه رسالة تجريبية من الطرف الآخر</div>
<div class="msg me">وهذه رسالة منك</div>
<div class="msg other">اختبر التمرير</div>
<div class="msg me">اختبر الكيبورد</div>
<div class="msg other">اختبر الوضع الأفقي</div>

</div>

<footer>

<input id="text" placeholder="اكتب رسالة...">

<button onclick="send()">إرسال</button>

</footer>

</div>

<script>

const messages = document.getElementById("messages")
const input = document.getElementById("text")

function send(){

if(!input.value.trim()) return

const div = document.createElement("div")
div.className="msg me"
div.textContent=input.value

messages.appendChild(div)

input.value=""

messages.scrollTop=messages.scrollHeight

}

</script>

</body>
</html>
