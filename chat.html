<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>الشات الخاص</title>

<style>
:root{
  --bg:#0f172a;
  --header:#1e293b;
  --footer:#1e293b;
  --mine:#2563eb;
  --other:#1f2937;
  --border:#334155;
  --text:#ffffff;
  --muted:#cbd5e1;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --reply-accent:#86efac;
  --header-total-h:72px;
  --composer-total-h:88px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:tahoma,sans-serif;
  color:var(--text);
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
}

body{
  position:fixed;
  inset:0;
  touch-action:none;
}

button,
input,
textarea{
  font-family:inherit;
}

.hidden{
  display:none !important;
}

.app{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    linear-gradient(rgba(15,23,42,.97), rgba(15,23,42,.97)),
    radial-gradient(circle at top right, rgba(37,99,235,.18), transparent 30%);
}

header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:50;
  background:var(--header);
  border-bottom:1px solid var(--border);
  padding-top:var(--safe-top);
}

.header-inner{
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 14px;
  font-size:18px;
  font-weight:bold;
}

.messages{
  position:fixed;
  top:var(--header-total-h);
  left:0;
  right:0;
  bottom:var(--composer-total-h);
  overflow-y:auto;
  overflow-x:hidden;
  padding:14px 10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:transparent;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  overscroll-behavior-x:none;
  touch-action:pan-y;
}

.status-bar{
  position:fixed;
  top:var(--header-total-h);
  left:50%;
  transform:translateX(-50%);
  z-index:60;
  max-width:min(92vw, 520px);
  background:rgba(17,24,39,.92);
  border:1px solid rgba(255,255,255,.08);
  color:var(--muted);
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
  text-align:center;
  pointer-events:none;
  opacity:0;
  transition:opacity .18s ease;
}

.status-bar.show{
  opacity:1;
}

.msg-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
  position:relative;
  transition:transform .16s ease;
  will-change:transform;
}

.msg-wrap.me{
  align-items:flex-end;
}

.msg-wrap.other{
  align-items:flex-start;
}

.reply-hint{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  opacity:0;
  transition:opacity .12s ease;
  font-size:18px;
  pointer-events:none;
}

.msg-wrap.swiping .reply-hint{
  opacity:1;
}

.msg-wrap.me .reply-hint{
  right:-24px;
}

.msg-wrap.other .reply-hint{
  left:-24px;
}

.msg{
  max-width:80%;
  padding:10px 12px 8px;
  border-radius:16px;
  word-break:break-word;
  overflow-wrap:anywhere;
  position:relative;
  box-shadow:0 6px 14px rgba(0,0,0,.16);
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.msg.me{
  background:var(--mine);
  border-bottom-right-radius:6px;
}

.msg.other{
  background:var(--other);
  border-bottom-left-radius:6px;
}

.reply-box{
  background:rgba(255,255,255,.11);
  border-right:3px solid var(--reply-accent);
  border-radius:10px;
  padding:7px 9px;
  margin-bottom:8px;
  font-size:12px;
  overflow:hidden;
}

.reply-name{
  font-weight:bold;
  margin-bottom:3px;
}

.reply-text{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  opacity:.95;
}

.msg-text{
  white-space:pre-wrap;
  line-height:1.45;
  font-size:15px;
  -webkit-user-select:none;
  user-select:none;
}

.msg-meta{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
  gap:6px;
  font-size:11px;
  color:rgba(255,255,255,.82);
}

.msg-media{
  padding:4px 2px 2px;
}

.msg-image{
  max-width:220px;
  border-radius:10px;
  display:block;
  -webkit-user-drag:none;
  user-select:none;
  cursor:pointer;
}

.msg-video{
  max-width:220px;
  border-radius:10px;
  display:block;
}

.msg-audio{
  width:220px;
}

.msg-file{
  font-size:14px;
}

.msg-file a{
  color:#fff;
  text-decoration:underline;
}

.msg-media + .msg-text,
.msg-file + .msg-text{
  margin-top:6px;
}

.composer-shell{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
  background:var(--footer);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}

.reply-preview,
.attachment-preview,
.recording-preview,
.edit-preview{
  padding:8px 10px 0;
}

.recording-preview-box,
.attachment-preview-box,
.reply-preview-box,
.edit-preview-box{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;
  padding:10px 12px;
}

.reply-preview-box,
.edit-preview-box{
  border-right:4px solid var(--reply-accent);
}

.recording-preview-main,
.attachment-preview-main,
.reply-preview-main,
.edit-preview-main{
  min-width:0;
  flex:1;
}

.recording-preview-main{
  display:flex;
  align-items:center;
  gap:10px;
}

.recording-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ef4444;
  flex:0 0 10px;
  animation:recordPulse 1s infinite;
}

.recording-label,
.attachment-preview-title,
.reply-preview-title,
.edit-preview-title{
  font-size:12px;
  font-weight:bold;
  color:#fff;
}

.recording-time,
.reply-preview-text,
.edit-preview-text{
  font-size:13px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.attachment-preview-meta{
  font-size:13px;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.recording-cancel,
.attachment-preview-close,
.reply-close,
.edit-close{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  padding:0;
}

.attachment-preview-thumb{
  max-width:120px;
  max-height:90px;
  border-radius:10px;
  display:block;
  object-fit:cover;
  border:1px solid rgba(255,255,255,.08);
}

.attachment-preview-video{
  width:160px;
  max-width:100%;
  max-height:120px;
  border-radius:10px;
  display:block;
  background:#000;
  border:1px solid rgba(255,255,255,.08);
}

.attachment-preview-audio{
  width:220px;
  max-width:100%;
  display:block;
}

@keyframes recordPulse{
  0%{ opacity:1; }
  50%{ opacity:.45; }
  100%{ opacity:1; }
}

footer{
  min-height:76px;
  display:flex;
  gap:8px;
  padding:10px;
  background:var(--footer);
  align-items:flex-end;
  flex-wrap:nowrap;
  min-width:0;
  width:100%;
  max-width:100%;
  overflow:hidden;
}

textarea{
  flex:1;
  min-width:0;
  min-height:48px;
  max-height:96px;
  border:none;
  outline:none;
  border-radius:14px;
  padding:12px 14px;
  font-size:16px;
  background:#fff;
  color:#111827;
  resize:none;
  overflow-y:auto;
  line-height:1.45;
  white-space:pre-wrap;
  word-break:break-word;
}

button.send-btn{
  flex:0 0 auto;
  width:48px;
  min-width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
}

button.send-btn svg{
  width:22px;
  height:22px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.attach-btn{
  flex:0 0 auto;
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:#111827;
  color:#fff;
  font-size:28px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.attach-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  z-index:1100;
}

.attach-sheet{
  width:min(260px, calc(100% - 40px));
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.attach-head,
.menu-head{
  display:none;
}

.attach-option,
.menu-btn{
  width:100%;
  background:transparent;
  border:none;
  color:#fff;
  display:flex;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.attach-option{
  align-items:center;
  justify-content:flex-start;
  gap:8px;
  text-align:right;
  padding:11px 12px;
  font-size:14px;
  flex-direction:row-reverse;
}

.attach-option:last-child,
.menu-btn:last-child{
  border-bottom:none;
}

.attach-option-icon{
  width:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.attach-option-text,
.menu-btn-text{
  white-space:nowrap;
}

.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:1000;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-center{
  width:min(260px, calc(100% - 40px));
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-inline:auto;
}

.menu-message-preview{
  display:flex;
  justify-content:flex-end;
  width:100%;
  pointer-events:none;
}

.menu-message-preview .preview-bubble{
  max-width:74%;
  max-height:170px;
  padding:9px 11px 8px;
  border-radius:15px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
  word-break:break-word;
  overflow-wrap:anywhere;
  overflow-y:auto;
}

.menu-message-preview .preview-bubble.me{
  background:var(--mine);
  border-bottom-right-radius:6px;
}

.menu-message-preview .preview-bubble.other{
  background:var(--other);
  border-bottom-left-radius:6px;
}

.menu-message-preview .preview-text{
  white-space:pre-wrap;
  line-height:1.45;
  font-size:15px;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-message-preview .preview-meta{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
  font-size:11px;
  color:rgba(255,255,255,.82);
}

.menu-sheet{
  width:100%;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-btn{
  align-items:center;
  justify-content:space-between;
  text-align:right;
  padding:13px 18px;
  font-size:14px;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-btn-label{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.menu-btn-icon{
  width:16px;
  height:16px;
  flex:0 0 16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  opacity:.95;
}

.menu-btn-icon svg{
  width:18px;
  height:18px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:1.9;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.menu-btn.danger{
  color:#fca5a5;
}

.media-viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:2000;
}

.media-viewer-image,
.media-viewer-video{
  max-width:95vw;
  max-height:90vh;
  border-radius:14px;
  display:block;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

@media (max-width:420px){
  .header-inner{
    min-height:54px;
    font-size:17px;
  }

  .msg{
    max-width:86%;
  }

  textarea{
    min-height:46px;
  }

  .send-btn{
    width:46px;
    min-width:46px;
    height:46px;
  }

  .attach-btn{
    width:46px;
    height:46px;
    font-size:26px;
  }

  .messages{
    -webkit-user-select:none;
    user-select:none;
  }
}
</style>
</head>
<body>

<div class="app">
  <header id="chatHeader">
    <div class="header-inner">الشات الخاص 🤍</div>
  </header>

  <div class="status-bar" id="statusBar"></div>
  <div class="messages" id="messages"></div>

  <div class="composer-shell" id="composerShell">
    <div class="reply-preview hidden" id="replyPreview"></div>
    <div class="edit-preview hidden" id="editPreview"></div>
    <div class="attachment-preview hidden" id="attachmentPreview"></div>
    <div class="recording-preview hidden" id="recordingPreview"></div>

    <footer>
      <input id="imagePicker" type="file" accept="image/*" class="hidden" />
      <input id="videoPicker" type="file" accept="video/*" class="hidden" />
      <input id="filePicker" type="file" class="hidden" />
      <input id="audioPicker" type="file" accept="audio/*" class="hidden" />

      <button class="attach-btn" id="attachBtn" type="button" aria-label="إضافة مرفق">+</button>
      <textarea
        id="text"
        placeholder="اكتب رسالة..."
        rows="1"
        enterkeyhint="enter"
      ></textarea>
      <button class="send-btn" id="sendBtn" type="button" aria-label="إرسال أو تسجيل صوت"></button>
    </footer>
  </div>
</div>

<div class="menu-overlay" id="menuOverlay">
  <div class="menu-center">
    <div class="menu-message-preview" id="menuMessagePreview"></div>

    <div class="menu-sheet">
      <div class="menu-head" id="menuHead">خيارات الرسالة</div>
      <div id="menuActions"></div>
    </div>
  </div>
</div>

<div class="attach-overlay" id="attachOverlay">
  <div class="attach-sheet">
    <div class="attach-head">إرسال مرفق</div>

    <button class="attach-option" type="button" data-kind="image">
      <span class="attach-option-icon">🖼️</span>
      <span class="attach-option-text">صورة</span>
    </button>

    <button class="attach-option" type="button" data-kind="video">
      <span class="attach-option-icon">🎥</span>
      <span class="attach-option-text">فيديو</span>
    </button>

    <button class="attach-option" type="button" data-kind="file">
      <span class="attach-option-icon">📎</span>
      <span class="attach-option-text">ملف</span>
    </button>

    <button class="attach-option" type="button" data-kind="audio">
      <span class="attach-option-icon">🎤</span>
      <span class="attach-option-text">ملف صوت</span>
    </button>
  </div>
</div>

<div class="media-viewer hidden" id="mediaViewer"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://vbwtsnxrshgjqmbgtagw.supabase.co',
  'sb_publishable_esJOtB6hRNf48Uo61txcyg_9F3yolJO'
);

const root = document.documentElement;
const headerEl = document.getElementById('chatHeader');
const composerShell = document.getElementById('composerShell');
const messagesEl = document.getElementById('messages');
const statusBar = document.getElementById('statusBar');
const imagePicker = document.getElementById('imagePicker');
const videoPicker = document.getElementById('videoPicker');
const filePicker = document.getElementById('filePicker');
const audioPicker = document.getElementById('audioPicker');
const attachBtn = document.getElementById('attachBtn');
const input = document.getElementById('text');
const sendBtn = document.getElementById('sendBtn');
const replyPreview = document.getElementById('replyPreview');
const editPreview = document.getElementById('editPreview');
const attachmentPreview = document.getElementById('attachmentPreview');
const recordingPreview = document.getElementById('recordingPreview');
const menuOverlay = document.getElementById('menuOverlay');
const menuHead = document.getElementById('menuHead');
const menuActions = document.getElementById('menuActions');
const menuMessagePreview = document.getElementById('menuMessagePreview');
const attachOverlay = document.getElementById('attachOverlay');
const mediaViewer = document.getElementById('mediaViewer');

let currentUser = null;
let currentRole = 'member';
let currentEmail = '';
let realtimeChannel = null;
let accountStatusTimer = null;

let replyingToId = null;
let editingId = null;
let menuTargetId = null;
let selectedAttachment = null;
let selectedAttachmentUrl = '';
let mediaRecorder = null;
let mediaStream = null;
let recordedChunks = [];
let isRecording = false;
let recordingTimer = null;
let recordingSeconds = 0;

let longPressTimer = null;
let pressStartX = 0;
let pressStartY = 0;
let isSwiping = false;
let swipeTarget = null;
let suppressClickUntil = 0;

const SWIPE_REPLY_THRESHOLD = 72;
const SWIPE_MAX = 90;
const LONG_PRESS_MS = 380;
const MOVE_CANCEL = 10;
const MAX_ATTACHMENT_SIZE = 20 * 1024 * 1024;

const messageMap = new Map();
let renderedOrder = [];
let statusHideTimer = null;

function setStatus(text, persistMs = 2200) {
  statusBar.textContent = text || '';
  statusBar.classList.toggle('show', !!text);

  if (statusHideTimer) {
    clearTimeout(statusHideTimer);
    statusHideTimer = null;
  }

  if (text && persistMs > 0) {
    statusHideTimer = setTimeout(() => {
      statusBar.classList.remove('show');
    }, persistMs);
  }
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function formatMessageTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('ar', {
    hour: '2-digit',
    minute: '2-digit'
  });
}

function syncLayoutHeights() {
  const headerH = Math.ceil(headerEl.getBoundingClientRect().height);
  const composerH = Math.ceil(composerShell.getBoundingClientRect().height);
  root.style.setProperty('--header-total-h', `${headerH}px`);
  root.style.setProperty('--composer-total-h', `${composerH}px`);
}

function getActionButtonIcon(mode) {
  if (mode === 'send') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M22 2L11 13"></path>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
      </svg>
    `;
  }

  if (mode === 'stop') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="7" y="7" width="10" height="10" rx="2"></rect>
      </svg>
    `;
  }

  return `
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V6a3 3 0 0 1 3-3z"></path>
      <path d="M19 11a7 7 0 0 1-14 0"></path>
      <path d="M12 18v3"></path>
      <path d="M8 21h8"></path>
    </svg>
  `;
}

function updateComposerActionButton() {
  const hasText = input.value.trim().length > 0;
  const hasAttachment = !!selectedAttachment;

  let mode;
  if (isRecording) mode = 'stop';
  else if (hasText || hasAttachment) mode = 'send';
  else mode = 'mic';

  sendBtn.dataset.mode = mode;
  sendBtn.innerHTML = getActionButtonIcon(mode);

  if (mode === 'send') sendBtn.setAttribute('aria-label', 'إرسال الرسالة');
  else if (mode === 'stop') sendBtn.setAttribute('aria-label', 'إيقاف التسجيل');
  else sendBtn.setAttribute('aria-label', 'تسجيل صوت');
}

function autoGrowTextarea() {
  input.style.height = '48px';
  const nextHeight = Math.min(input.scrollHeight, 96);
  input.style.height = nextHeight + 'px';
}

function getMsgById(id) {
  return messageMap.get(id) || null;
}

function isMineMessage(msg) {
  return msg?.user_id === currentUser?.id;
}

function getMessagePreviewLabel(msg) {
  if (!msg) return 'رسالة';
  if (msg.content && String(msg.content).trim()) return String(msg.content).trim();
  if (msg.attachment_type === 'image') return '📷 صورة';
  if (msg.attachment_type === 'video') return '🎬 فيديو';
  if (msg.attachment_type === 'audio') return '🎵 صوت';
  if (msg.attachment_type === 'file') return '📎 ملف';
  return 'رسالة';
}

function getMessageSenderName(msg) {
  if (!msg) return 'مستخدم';
  return isMineMessage(msg) ? 'أنت' : (msg.sender_name || 'الطرف الآخر');
}

function getDisplayNameFromEmail(email) {
  if (!email) return 'مستخدم';
  return email.split('@')[0];
}

function sanitizeFileName(name) {
  return String(name || '').replace(/[^\w.\-]+/g, '_');
}

function getAttachmentTypeFromFile(file) {
  const type = String(file?.type || '');
  if (type.startsWith('image/')) return 'image';
  if (type.startsWith('video/')) return 'video';
  if (type.startsWith('audio/')) return 'audio';
  return 'file';
}

async function requireSession() {
  const { data, error } = await supabase.auth.getSession();
  if (error) throw error;

  const user = data.session?.user;
  if (!user || user.is_anonymous || !user.email) {
    window.location.href = 'login.html';
    throw new Error('لا توجد جلسة تسجيل دخول صالحة');
  }

  return user;
}

async function getRole(userId) {
  const { data, error } = await supabase
    .from('user_roles')
    .select('role')
    .eq('id', userId)
    .maybeSingle();

  if (error) throw error;
  return data?.role || 'member';
}

async function getMyAccountStatus() {
  const { data, error } = await supabase.rpc('get_my_account_status');
  if (error) throw error;
  return Array.isArray(data) ? (data[0] || null) : (data || null);
}

function isCurrentlyBanned(statusRow) {
  if (!statusRow || !statusRow.banned_until) return false;
  return new Date(statusRow.banned_until).getTime() > Date.now();
}

async function enforceNotBanned() {
  const statusRow = await getMyAccountStatus();
  if (isCurrentlyBanned(statusRow)) {
    throw new Error('هذا الحساب محظور حاليًا ولا يمكنه استخدام الشات.');
  }
}

function startAccountStatusWatcher() {
  if (accountStatusTimer) clearInterval(accountStatusTimer);

  accountStatusTimer = setInterval(async () => {
    try {
      await enforceNotBanned();
    } catch (err) {
      clearInterval(accountStatusTimer);
      alert(err.message || 'الحساب محظور');
      window.location.reload();
    }
  }, 15000);
}

async function uploadAttachment(file) {
  const safeName = sanitizeFileName(file.name);
  const filePath = `${currentUser.id}/${Date.now()}_${safeName}`;

  const { error } = await supabase
    .storage
    .from('chat')
    .upload(filePath, file, {
      cacheControl: '3600',
      upsert: false,
      contentType: file.type || 'application/octet-stream'
    });

  if (error) throw error;
  return filePath;
}

async function createSignedAttachmentUrl(path) {
  const { data, error } = await supabase
    .storage
    .from('chat')
    .createSignedUrl(path, 3600);

  if (error) throw error;
  return data?.signedUrl || '';
}

async function hydrateMessage(msg) {
  const hydrated = { ...msg };
  if (hydrated.attachment_path) {
    try {
      hydrated._signedUrl = await createSignedAttachmentUrl(hydrated.attachment_path);
    } catch {
      hydrated._signedUrl = '';
    }
  } else {
    hydrated._signedUrl = '';
  }
  return hydrated;
}

function renderReplySnippet(msg) {
  if (!msg.reply_to_id) return '';

  const original = getMsgById(msg.reply_to_id);
  const name = getMessageSenderName(original);
  const text = getMessagePreviewLabel(original);

  return `
    <div class="reply-box">
      <div class="reply-name">${escapeHtml(name)}</div>
      <div class="reply-text">${escapeHtml(text)}</div>
    </div>
  `;
}

function renderMessageContent(msg) {
  const textHtml = msg.content
    ? `<div class="msg-text">${escapeHtml(msg.content)}</div>`
    : '';

  if (msg.attachment_type === 'image') {
    return `
      <div class="msg-media">
        <img src="${msg._signedUrl || ''}" class="msg-image" data-media-kind="image" data-media-src="${msg._signedUrl || ''}" alt="صورة">
      </div>
      ${textHtml}
    `;
  }

  if (msg.attachment_type === 'video') {
    return `
      <div class="msg-media">
        <video src="${msg._signedUrl || ''}" controls playsinline class="msg-video" data-media-kind="video" data-media-src="${msg._signedUrl || ''}"></video>
      </div>
      ${textHtml}
    `;
  }

  if (msg.attachment_type === 'audio') {
    return `
      <div class="msg-media">
        <audio src="${msg._signedUrl || ''}" controls class="msg-audio"></audio>
      </div>
      ${textHtml}
    `;
  }

  if (msg.attachment_type === 'file') {
    const fileName = msg.attachment_path?.split('/').pop() || 'ملف';
    return `
      <div class="msg-file">
        <a href="${msg._signedUrl || '#'}" target="_blank" rel="noopener">📎 ${escapeHtml(fileName)}</a>
      </div>
      ${textHtml}
    `;
  }

  return textHtml || `<div class="msg-text"></div>`;
}

function renderMessages(options = {}) {
  const { preserveScroll = false } = options;
  const wasNearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120;
  const previousTop = messagesEl.scrollTop;

  messagesEl.innerHTML = '';

  renderedOrder.forEach(id => {
    const msg = messageMap.get(id);
    if (!msg) return;

    const mine = isMineMessage(msg);
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${mine ? 'me' : 'other'}`;
    wrap.dataset.id = String(msg.id);

    wrap.innerHTML = `
      <div class="reply-hint">↩️</div>
      <div class="msg ${mine ? 'me' : 'other'}">
        ${renderReplySnippet(msg)}
        ${renderMessageContent(msg)}
        <div class="msg-meta">
          ${msg.updated_at ? '<span>(تم التعديل)</span>' : ''}
          <span>${escapeHtml(formatMessageTime(msg.created_at))}</span>
        </div>
      </div>
    `;

    bindInteractions(wrap, msg);
    messagesEl.appendChild(wrap);

    const mediaEl = wrap.querySelector('[data-media-kind]');
    if (mediaEl) {
      mediaEl.addEventListener('click', () => {
        openMediaViewer(mediaEl.dataset.mediaKind, mediaEl.dataset.mediaSrc || '');
      });
    }
  });

  if (preserveScroll) {
    messagesEl.scrollTop = previousTop;
  } else if (wasNearBottom) {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  requestAnimationFrame(syncLayoutHeights);
}

async function loadMessages() {
  const { data, error } = await supabase
    .from('chat_messages')
    .select('*')
    .order('created_at', { ascending: true });

  if (error) throw error;

  messageMap.clear();
  renderedOrder = [];

  for (const raw of data) {
    const msg = await hydrateMessage(raw);
    messageMap.set(msg.id, msg);
    renderedOrder.push(msg.id);
  }

  renderMessages();
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function clearReplyPreview() {
  replyingToId = null;
  replyPreview.classList.add('hidden');
  replyPreview.innerHTML = '';
  requestAnimationFrame(syncLayoutHeights);
}

function clearEditPreview(clearInput = true) {
  editingId = null;
  editPreview.classList.add('hidden');
  editPreview.innerHTML = '';
  if (clearInput) {
    input.value = '';
    autoGrowTextarea();
  }
  updateComposerActionButton();
  requestAnimationFrame(syncLayoutHeights);
}

function openReplyPreview(msgId) {
  replyingToId = msgId;
  clearEditPreview(false);

  const msg = getMsgById(msgId);
  const name = getMessageSenderName(msg);
  const text = getMessagePreviewLabel(msg);

  replyPreview.classList.remove('hidden');
  replyPreview.innerHTML = `
    <div class="reply-preview-box">
      <div class="reply-preview-main">
        <div class="reply-preview-title">رد على ${escapeHtml(name)}</div>
        <div class="reply-preview-text">${escapeHtml(text)}</div>
      </div>
      <button class="reply-close" id="closeReplyBtn" type="button">×</button>
    </div>
  `;

  document.getElementById('closeReplyBtn').addEventListener('click', clearReplyPreview);
  requestAnimationFrame(syncLayoutHeights);
  input.focus();
}

function openEditPreview(msg) {
  editPreview.classList.remove('hidden');
  editPreview.innerHTML = `
    <div class="edit-preview-box">
      <div class="edit-preview-main">
        <div class="edit-preview-title">جارٍ تعديل الرسالة</div>
        <div class="edit-preview-text">${escapeHtml(getMessagePreviewLabel(msg))}</div>
      </div>
      <button class="edit-close" id="closeEditBtn" type="button">×</button>
    </div>
  `;

  document.getElementById('closeEditBtn').addEventListener('click', () => clearEditPreview());
  requestAnimationFrame(syncLayoutHeights);
}

function getMenuIconSvg(type) {
  if (type === 'copy') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="9" y="9" width="10" height="10" rx="2"></rect>
        <path d="M7 15H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1"></path>
      </svg>
    `;
  }

  if (type === 'edit') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
      </svg>
    `;
  }

  if (type === 'delete') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6h18"></path>
        <path d="M8 6V4h8v2"></path>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
      </svg>
    `;
  }

  return '';
}

function openMenu(msg) {
  menuTargetId = msg.id;
  menuHead.textContent = isMineMessage(msg) ? 'خيارات رسالتك' : 'خيارات الرسالة';
  menuActions.innerHTML = '';

  menuMessagePreview.innerHTML = `
    <div class="preview-bubble ${isMineMessage(msg) ? 'me' : 'other'}">
      <div class="preview-text">${escapeHtml(getMessagePreviewLabel(msg))}</div>
      <div class="preview-meta">${escapeHtml(formatMessageTime(msg.created_at) || '')}</div>
    </div>
  `;

  const actions = [
    {
      label: 'نسخ',
      icon: 'copy',
      action: () => copyMessage(msg.id)
    }
  ];

  if (isMineMessage(msg)) {
    actions.push(
      {
        label: 'تعديل',
        icon: 'edit',
        action: () => editMessage(msg.id)
      },
      {
        label: 'حذف',
        icon: 'delete',
        action: () => deleteMessage(msg.id),
        danger: true
      }
    );
  }

  actions.forEach(item => {
    const btn = document.createElement('button');
    btn.className = `menu-btn${item.danger ? ' danger' : ''}`;
    btn.type = 'button';
    btn.innerHTML = `
      <span class="menu-btn-label">
        <span class="menu-btn-icon">${getMenuIconSvg(item.icon)}</span>
        <span class="menu-btn-text">${item.label}</span>
      </span>
    `;
    btn.addEventListener('click', async () => {
      closeMenu();
      await item.action();
    });
    menuActions.appendChild(btn);
  });

  menuOverlay.style.display = 'flex';
}

function closeMenu() {
  menuOverlay.style.display = 'none';
  menuTargetId = null;
  menuMessagePreview.innerHTML = '';
}

function openAttachSheet() {
  attachOverlay.style.display = 'flex';
}

function closeAttachSheet() {
  attachOverlay.style.display = 'none';
}

function openMediaViewer(kind, src) {
  if (!src) return;
  if (kind === 'image') {
    mediaViewer.innerHTML = `<img class="media-viewer-image" src="${src}" alt="عرض الصورة">`;
  } else if (kind === 'video') {
    mediaViewer.innerHTML = `<video class="media-viewer-video" src="${src}" controls autoplay playsinline></video>`;
  } else {
    return;
  }
  mediaViewer.classList.remove('hidden');
}

function closeMediaViewer() {
  mediaViewer.innerHTML = '';
  mediaViewer.classList.add('hidden');
}

function formatRecordingTime(totalSeconds) {
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function stopMediaTracks() {
  if (mediaStream) {
    mediaStream.getTracks().forEach(track => track.stop());
    mediaStream = null;
  }
}

function updateRecordingPreview() {
  if (!isRecording) {
    recordingPreview.classList.add('hidden');
    recordingPreview.innerHTML = '';
    requestAnimationFrame(syncLayoutHeights);
    return;
  }

  recordingPreview.classList.remove('hidden');
  recordingPreview.innerHTML = `
    <div class="recording-preview-box">
      <div class="recording-preview-main">
        <span class="recording-dot"></span>
        <span class="recording-label">جارٍ تسجيل الصوت</span>
        <span class="recording-time">${formatRecordingTime(recordingSeconds)}</span>
      </div>
      <button class="recording-cancel" id="cancelRecordingBtn" type="button">×</button>
    </div>
  `;

  document.getElementById('cancelRecordingBtn').addEventListener('click', cancelRecording);
  requestAnimationFrame(syncLayoutHeights);
}

async function startRecording() {
  if (selectedAttachment) clearSelectedAttachment();
  if (editingId) return;

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(mediaStream);
    recordedChunks = [];
    recordingSeconds = 0;

    mediaRecorder.addEventListener('dataavailable', (event) => {
      if (event.data && event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    });

    mediaRecorder.addEventListener('stop', () => {
      const mimeType = mediaRecorder?.mimeType || 'audio/webm';
      const ext = mimeType.includes('ogg') ? 'ogg' : 'webm';
      const audioBlob = new Blob(recordedChunks, { type: mimeType });
      selectedAttachment = new File([audioBlob], `recording_${Date.now()}.${ext}`, { type: mimeType });
      updateAttachmentPreview();
      stopMediaTracks();
      mediaRecorder = null;
      recordedChunks = [];
      updateComposerActionButton();
    });

    mediaRecorder.start();
    isRecording = true;
    updateComposerActionButton();
    updateRecordingPreview();

    recordingTimer = setInterval(() => {
      recordingSeconds += 1;
      updateRecordingPreview();
    }, 1000);
  } catch {
    alert('تعذر الوصول إلى الميكروفون');
    stopMediaTracks();
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;

  isRecording = false;

  if (recordingTimer) {
    clearInterval(recordingTimer);
    recordingTimer = null;
  }

  updateComposerActionButton();
  updateRecordingPreview();
  mediaRecorder.stop();
}

function cancelRecording() {
  if (!isRecording) return;

  isRecording = false;

  if (recordingTimer) {
    clearInterval(recordingTimer);
    recordingTimer = null;
  }

  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }

  mediaRecorder = null;
  recordedChunks = [];
  recordingSeconds = 0;
  stopMediaTracks();
  clearSelectedAttachment();
  updateComposerActionButton();
  updateRecordingPreview();
}

function clearSelectedAttachment() {
  selectedAttachment = null;

  if (selectedAttachmentUrl) {
    URL.revokeObjectURL(selectedAttachmentUrl);
    selectedAttachmentUrl = '';
  }

  attachmentPreview.classList.add('hidden');
  attachmentPreview.innerHTML = '';

  if (!isRecording) {
    recordingPreview.classList.add('hidden');
    recordingPreview.innerHTML = '';
  }

  updateComposerActionButton();
  requestAnimationFrame(syncLayoutHeights);
}

function updateAttachmentPreview() {
  if (!selectedAttachment) {
    attachmentPreview.classList.add('hidden');
    attachmentPreview.innerHTML = '';
    requestAnimationFrame(syncLayoutHeights);
    return;
  }

  if (selectedAttachmentUrl) {
    URL.revokeObjectURL(selectedAttachmentUrl);
    selectedAttachmentUrl = '';
  }

  const file = selectedAttachment;
  const type = file.type || '';
  let previewMedia = '';

  if (type.startsWith('image/')) {
    selectedAttachmentUrl = URL.createObjectURL(file);
    previewMedia = `<img class="attachment-preview-thumb" src="${selectedAttachmentUrl}" alt="معاينة صورة">`;
  } else if (type.startsWith('video/')) {
    selectedAttachmentUrl = URL.createObjectURL(file);
    previewMedia = `<video class="attachment-preview-video" src="${selectedAttachmentUrl}" controls playsinline preload="metadata"></video>`;
  } else if (type.startsWith('audio/')) {
    selectedAttachmentUrl = URL.createObjectURL(file);
    previewMedia = `<audio class="attachment-preview-audio" src="${selectedAttachmentUrl}" controls preload="metadata"></audio>`;
  }

  attachmentPreview.classList.remove('hidden');
  attachmentPreview.innerHTML = `
    <div class="attachment-preview-box">
      <div class="attachment-preview-main">
        <div class="attachment-preview-title">مرفق جاهز للإرسال</div>
        ${previewMedia}
        <div class="attachment-preview-meta">${escapeHtml(file.name)}</div>
      </div>
      <button class="attachment-preview-close" id="clearAttachmentBtn" type="button">×</button>
    </div>
  `;

  document.getElementById('clearAttachmentBtn').addEventListener('click', clearSelectedAttachment);
  requestAnimationFrame(syncLayoutHeights);
}

function handlePickedFile(file) {
  if (!file) return;

  if (isRecording) cancelRecording();
  if (file.size > MAX_ATTACHMENT_SIZE) {
    alert('حجم المرفق يجب أن يكون أقل من 20MB');
    return;
  }

  selectedAttachment = file;
  updateAttachmentPreview();
  updateComposerActionButton();
}

async function copyMessage(id) {
  const msg = getMsgById(id);
  if (!msg) return;

  const textToCopy = msg.content?.trim() || getMessagePreviewLabel(msg);
  try {
    await navigator.clipboard.writeText(textToCopy);
    setStatus('تم نسخ الرسالة');
  } catch {
    alert('تعذر النسخ');
  }
}

function editMessage(id) {
  const msg = getMsgById(id);
  if (!msg || !isMineMessage(msg)) return;

  editingId = id;
  clearReplyPreview();
  clearSelectedAttachment();
  input.value = msg.content || '';
  autoGrowTextarea();
  updateComposerActionButton();
  openEditPreview(msg);
  input.focus();
}

async function deleteMessage(id) {
  const msg = getMsgById(id);
  if (!msg || !isMineMessage(msg)) return;
  if (!confirm('هل تريد حذف الرسالة؟')) return;

  try {
    const { error } = await supabase
      .from('chat_messages')
      .delete()
      .eq('id', id)
      .eq('user_id', currentUser.id);

    if (error) throw error;
    setStatus('تم حذف الرسالة');
  } catch (err) {
    alert(err.message || 'تعذر حذف الرسالة');
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text && !selectedAttachment) return;

  try {
    await enforceNotBanned();
  } catch (err) {
    alert(err.message || 'لا يمكن الإرسال');
    return;
  }

  sendBtn.disabled = true;
  attachBtn.disabled = true;

  try {
    if (editingId) {
      if (!text) {
        alert('لا يمكن حفظ رسالة فارغة');
        return;
      }

      const target = getMsgById(editingId);
      if (!target || !isMineMessage(target)) {
        throw new Error('لا يمكنك تعديل هذه الرسالة');
      }

      const { error } = await supabase
        .from('chat_messages')
        .update({ content: text })
        .eq('id', editingId)
        .eq('user_id', currentUser.id);

      if (error) throw error;

      clearEditPreview();
      updateComposerActionButton();
      setStatus('تم تعديل الرسالة');
      return;
    }

    let attachmentPath = null;
    let attachmentType = null;

    if (selectedAttachment) {
      attachmentType = getAttachmentTypeFromFile(selectedAttachment);
      attachmentPath = await uploadAttachment(selectedAttachment);
    }

    const { error } = await supabase
      .from('chat_messages')
      .insert({
        user_id: currentUser.id,
        content: text || null,
        sender_name: getDisplayNameFromEmail(currentEmail),
        attachment_path: attachmentPath,
        attachment_type: attachmentType,
        reply_to_id: replyingToId || null
      });

    if (error) throw error;

    input.value = '';
    autoGrowTextarea();
    clearReplyPreview();
    clearSelectedAttachment();
    updateComposerActionButton();
  } catch (err) {
    alert(err.message || 'تعذر إرسال الرسالة');
  } finally {
    sendBtn.disabled = false;
    attachBtn.disabled = false;
  }
}

function getPoint(e) {
  if (e.touches?.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches?.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX || 0, y: e.clientY || 0 };
}

function clearLongPress() {
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
}

function resetSwipe(wrap) {
  if (!wrap) return;
  wrap.style.transform = 'translateX(0px)';
  wrap.classList.remove('swiping');
}

function handleSwipeMove(e, wrap) {
  if (!swipeTarget) return;

  const point = getPoint(e);
  const dx = point.x - pressStartX;
  const dy = Math.abs(point.y - pressStartY);

  if (dy > MOVE_CANCEL && !isSwiping) {
    clearLongPress();
    swipeTarget = null;
    resetSwipe(wrap);
    return;
  }

  if (dx > 0) {
    isSwiping = true;
    clearLongPress();
    const move = Math.min(dx, SWIPE_MAX);
    wrap.style.transform = `translateX(${move}px)`;
    wrap.classList.add('swiping');
  }
}

function handleSwipeEnd(wrap, msg) {
  clearLongPress();

  const matrix = new DOMMatrixReadOnly(getComputedStyle(wrap).transform);
  const movedX = matrix.m41 || 0;

  if (movedX >= SWIPE_REPLY_THRESHOLD) {
    openReplyPreview(msg.id);
    if (navigator.vibrate) navigator.vibrate(20);
  }

  resetSwipe(wrap);
  swipeTarget = null;
  isSwiping = false;
}

function bindInteractions(wrap, msg) {
  const start = (e) => {
    const target = e.target;
    if (
      target.closest('button') ||
      target.closest('input') ||
      target.closest('textarea') ||
      target.closest('audio') ||
      target.closest('video') ||
      target.closest('a') ||
      target.closest('img')
    ) {
      return;
    }

    const p = getPoint(e);
    pressStartX = p.x;
    pressStartY = p.y;
    swipeTarget = wrap;
    isSwiping = false;

    clearLongPress();
    longPressTimer = setTimeout(() => {
      suppressClickUntil = Date.now() + 600;
      openMenu(msg);
      if (navigator.vibrate) navigator.vibrate(18);
    }, LONG_PRESS_MS);
  };

  const move = (e) => handleSwipeMove(e, wrap);
  const end = () => handleSwipeEnd(wrap, msg);
  const cancel = () => {
    clearLongPress();
    resetSwipe(wrap);
    swipeTarget = null;
    isSwiping = false;
  };

  wrap.addEventListener('touchstart', start, { passive: true });
  wrap.addEventListener('touchmove', move, { passive: true });
  wrap.addEventListener('touchend', end);
  wrap.addEventListener('touchcancel', cancel);

  wrap.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    start(e);
  });
  wrap.addEventListener('mousemove', move);
  wrap.addEventListener('mouseup', end);
  wrap.addEventListener('mouseleave', cancel);

  wrap.addEventListener('contextmenu', (e) => e.preventDefault());
  wrap.addEventListener('dragstart', (e) => e.preventDefault());
  wrap.addEventListener('selectstart', (e) => e.preventDefault());

  wrap.addEventListener('click', (e) => {
    if (Date.now() < suppressClickUntil) {
      e.preventDefault();
      e.stopPropagation();
    }
  });
}

function hideKeyboard() {
  if (document.activeElement === input) input.blur();
}

async function initRealtime() {
  if (realtimeChannel) {
    await supabase.removeChannel(realtimeChannel);
  }

  realtimeChannel = supabase
    .channel('chat_messages_live_new_ui')
    .on(
      'postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'chat_messages' },
      async (payload) => {
        const msg = await hydrateMessage(payload.new);
        messageMap.set(msg.id, msg);
        if (!renderedOrder.includes(msg.id)) renderedOrder.push(msg.id);
        renderMessages();
      }
    )
    .on(
      'postgres_changes',
      { event: 'UPDATE', schema: 'public', table: 'chat_messages' },
      async (payload) => {
        const msg = await hydrateMessage(payload.new);
        messageMap.set(msg.id, msg);
        if (!renderedOrder.includes(msg.id)) renderedOrder.push(msg.id);
        renderMessages({ preserveScroll: !isMineMessage(msg) });
      }
    )
    .on(
      'postgres_changes',
      { event: 'DELETE', schema: 'public', table: 'chat_messages' },
      (payload) => {
        const deletedId = payload.old.id;
        messageMap.delete(deletedId);
        renderedOrder = renderedOrder.filter(id => id !== deletedId);

        if (replyingToId === deletedId) clearReplyPreview();
        if (editingId === deletedId) clearEditPreview();
        if (menuTargetId === deletedId) closeMenu();

        renderMessages();
      }
    )
    .subscribe();
}

messagesEl.addEventListener('touchstart', hideKeyboard, { passive: true });
messagesEl.addEventListener('click', hideKeyboard);

document.addEventListener('pointerdown', (e) => {
  if (document.activeElement !== input) return;
  if (e.target === input) return;
  if (e.target.closest('.composer-shell')) return;
  hideKeyboard();
});

document.addEventListener('touchmove', (e) => {
  if (document.activeElement !== input) return;
  if (e.target.closest('.messages')) return;
  e.preventDefault();
}, { passive: false });

document.addEventListener('selectstart', (e) => {
  if (
    e.target.closest('.msg') ||
    e.target.closest('.msg-wrap') ||
    e.target.closest('.menu-overlay') ||
    e.target.closest('.menu-sheet') ||
    e.target.closest('.menu-btn') ||
    e.target.closest('.attach-overlay') ||
    e.target.closest('.attach-sheet') ||
    e.target.closest('.attach-option')
  ) {
    e.preventDefault();
  }
});

document.addEventListener('contextmenu', (e) => {
  if (
    e.target.closest('.msg') ||
    e.target.closest('.msg-wrap') ||
    e.target.closest('.menu-overlay') ||
    e.target.closest('.menu-sheet') ||
    e.target.closest('.menu-btn') ||
    e.target.closest('.attach-overlay') ||
    e.target.closest('.attach-sheet') ||
    e.target.closest('.attach-option')
  ) {
    e.preventDefault();
  }
});

attachBtn.addEventListener('click', () => {
  if (isRecording) return;
  hideKeyboard();
  openAttachSheet();
});

attachOverlay.addEventListener('click', (e) => {
  if (e.target === attachOverlay) closeAttachSheet();
});

document.querySelectorAll('.attach-option').forEach(btn => {
  btn.addEventListener('click', () => {
    const kind = btn.dataset.kind;
    closeAttachSheet();

    if (kind === 'image') imagePicker.click();
    if (kind === 'video') videoPicker.click();
    if (kind === 'file') filePicker.click();
    if (kind === 'audio') audioPicker.click();
  });
});

imagePicker.addEventListener('change', () => {
  handlePickedFile(imagePicker.files?.[0]);
  imagePicker.value = '';
});

videoPicker.addEventListener('change', () => {
  handlePickedFile(videoPicker.files?.[0]);
  videoPicker.value = '';
});

filePicker.addEventListener('change', () => {
  handlePickedFile(filePicker.files?.[0]);
  filePicker.value = '';
});

audioPicker.addEventListener('change', () => {
  handlePickedFile(audioPicker.files?.[0]);
  audioPicker.value = '';
});

sendBtn.addEventListener('click', async () => {
  const mode = sendBtn.dataset.mode;

  if (mode === 'send') {
    await sendMessage();
    return;
  }

  if (mode === 'stop') {
    stopRecording();
    return;
  }

  await startRecording();
});

input.addEventListener('input', () => {
  autoGrowTextarea();
  updateComposerActionButton();
});

input.addEventListener('focus', () => {
  setTimeout(syncLayoutHeights, 60);
  setTimeout(syncLayoutHeights, 220);
});

input.addEventListener('blur', () => {
  setTimeout(syncLayoutHeights, 60);
});

menuOverlay.addEventListener('click', (e) => {
  if (e.target === menuOverlay) closeMenu();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeMenu();
    closeMediaViewer();
  }
});

mediaViewer.addEventListener('click', (e) => {
  if (e.target === mediaViewer) closeMediaViewer();
});

window.addEventListener('resize', syncLayoutHeights);
window.addEventListener('orientationchange', () => {
  setTimeout(syncLayoutHeights, 80);
});
window.visualViewport?.addEventListener('resize', syncLayoutHeights);

async function init() {
  try {
    currentUser = await requireSession();
    currentEmail = currentUser.email || '';
    currentRole = await getRole(currentUser.id);
    await enforceNotBanned();

    await loadMessages();
    await initRealtime();
    startAccountStatusWatcher();

    autoGrowTextarea();
    updateComposerActionButton();
    syncLayoutHeights();
    setStatus(`تم تسجيل الدخول: ${currentEmail} | الصلاحية: ${currentRole}`);
  } catch (err) {
    console.error(err);
    alert(err.message || 'حدث خطأ أثناء تحميل الشات');
  }
}

init();
</script>
