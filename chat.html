<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الشات الخاص</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --mine:#2563eb;
      --other:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --border:#334155;
      --danger:#ef4444;
      --ok:#10b981;
      --header:#1e293b;
      --bubble-radius:12px;
      --chat-font-size:15px;
      --panel-bg:#111827;
      --input-bg:#ffffff;
      --input-text:#111827;
    }

    *{ box-sizing:border-box; }

    body{
      font-family:tahoma,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      display:flex;
      flex-direction:column;
      height:100vh;
      overflow:hidden;
    }

    header{
      background:var(--header);
      padding:14px 16px;
      text-align:center;
      font-size:18px;
      border-bottom:1px solid var(--border);
      position:relative;
      flex-shrink:0;
    }

    .top-actions{
      position:absolute;
      left:12px;
      top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .top-btn{
      background:#334155;
      color:#fff;
      border:none;
      border-radius:8px;
      padding:8px 10px;
      cursor:pointer;
      font-size:13px;
      width:auto;
      margin:0;
    }

    #statusBar{
      padding:10px 14px;
      font-size:14px;
      text-align:center;
      border-bottom:1px solid var(--border);
      background:#111827;
      color:var(--muted);
      flex-shrink:0;
    }

    #messages{
      flex:1;
      overflow:auto;
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
      font-size:var(--chat-font-size);
      overscroll-behavior-y:contain;
    }

    .msg-wrap{
      display:flex;
      width:100%;
      position:relative;
      user-select:none;
      touch-action:pan-y;
    }

    .msg-wrap.mine{
      justify-content:flex-end;
    }

    .msg-wrap.other{
      justify-content:flex-start;
    }

    .msg{
      max-width:78%;
      padding:10px 12px;
      border-radius:var(--bubble-radius);
      background:var(--other);
      align-self:flex-start;
      word-break:break-word;
      border:1px solid rgba(255,255,255,.04);
      box-shadow:0 2px 10px rgba(0,0,0,.12);
      position:relative;
      z-index:2;
      transform:translateX(0);
      transition:transform .18s ease;
      will-change:transform;
    }

    .msg.mine{
      background:var(--mine);
      align-self:flex-end;
    }

    .msg-wrap.swiping .msg{
      transition:none;
    }

    .reply-swipe-indicator{
      position:absolute;
      top:50%;
      transform:translateY(-50%) scale(.8);
      width:34px;
      height:34px;
      border-radius:50%;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      opacity:0;
      pointer-events:none;
      transition:opacity .15s ease, transform .15s ease, background .15s ease;
      z-index:1;
    }

    .msg-wrap.other .reply-swipe-indicator{
      right:10px;
    }

    .msg-wrap.mine .reply-swipe-indicator{
      left:10px;
    }

    .msg-wrap.show-indicator .reply-swipe-indicator{
      opacity:1;
      transform:translateY(-50%) scale(1);
    }

    .msg-wrap.reply-ready .reply-swipe-indicator{
      background:rgba(37,99,235,.8);
      transform:translateY(-50%) scale(1.08);
    }

    .msg .name{
      font-size:12px;
      opacity:.9;
      margin-bottom:5px;
      font-weight:bold;
    }

    .msg .meta{
      font-size:11px;
      opacity:.8;
      margin-top:6px;
    }

    .msg .attachment{
      display:block;
      margin-top:8px;
      max-width:min(340px, 100%);
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#0b1220;
    }

    .msg img.attachment{
      max-height:360px;
      object-fit:cover;
      cursor:pointer;
    }

    .msg video.attachment{
      max-height:360px;
    }

    .msg audio.attachment{
      width:280px;
      max-width:100%;
      padding:6px;
    }

    .msg .attachment-placeholder{
      margin-top:8px;
      font-size:12px;
      opacity:.8;
    }

    .msg-reply-box{
      margin-bottom:8px;
      padding:8px 10px;
      border-radius:10px;
      background:rgba(255,255,255,.09);
      border-right:3px solid rgba(255,255,255,.55);
      font-size:12px;
    }

    .msg-reply-name{
      font-weight:bold;
      margin-bottom:4px;
    }

    .msg-reply-text{
      opacity:.92;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    footer{
      display:flex;
      gap:10px;
      padding:10px;
      background:var(--card);
      border-top:1px solid var(--border);
      flex-shrink:0;
      align-items:center;
    }

    input[type="text"]{
      flex:1;
      padding:12px;
      border-radius:8px;
      border:none;
      outline:none;
      font-size:15px;
      background:var(--input-bg);
      color:var(--input-text);
    }

    button{
      padding:12px 16px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
    }

    .ghost-btn{
      background:#334155;
      width:auto;
      white-space:nowrap;
      min-width:52px;
      font-size:20px;
      line-height:1;
    }

    .recording-btn{
      background:#dc2626 !important;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{opacity:1}
      50%{opacity:.65}
      100%{opacity:1}
    }

    #attachmentInput{
      display:none;
    }

    #replyPreviewBox,
    #attachmentPreviewBox{
      display:none;
      padding:8px 12px;
      background:#111827;
      border-top:1px solid var(--border);
      flex-shrink:0;
    }

    .attachment-chip,
    .reply-chip{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      border-radius:12px;
      color:var(--muted);
      font-size:13px;
    }

    .attachment-chip .chip-main,
    .reply-chip .chip-main{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      min-width:0;
      flex:1;
    }

    .attachment-chip .chip-text,
    .reply-chip .chip-text{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:100%;
    }

    .attachment-chip audio{
      width:220px;
      max-width:100%;
    }

    .attachment-chip .remove,
    .reply-chip .remove{
      background:transparent;
      border:none;
      color:#fff;
      font-size:18px;
      cursor:pointer;
      width:auto;
      padding:0;
      margin:0;
      min-width:auto;
    }

    #loadingView{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .state-box{
      width:min(560px,100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:24px;
      text-align:center;
    }

    .hidden{
      display:none !important;
    }

    #settingsOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }

    #settingsPanel{
      width:min(520px,100%);
      max-height:90vh;
      overflow:auto;
      background:var(--panel-bg);
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    #settingsPanel h2{
      margin-top:0;
    }

    .setting-group{
      margin-bottom:18px;
      padding-bottom:14px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .setting-group:last-child{
      border-bottom:none;
    }

    .setting-group label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:14px;
    }

    .setting-group input,
    .setting-group select{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#0b1220;
      color:#fff;
      outline:none;
    }

    .settings-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .preview-box{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
    }

    .preview-bubble{
      max-width:80%;
      padding:10px 12px;
      border-radius:var(--bubble-radius);
      font-size:var(--chat-font-size);
    }

    .preview-bubble.mine{
      background:var(--mine);
      align-self:flex-end;
    }

    .preview-bubble.other{
      background:var(--other);
      align-self:flex-start;
    }

    #mediaViewer{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.88);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:2000;
      padding:20px;
    }

    #mediaViewer img,
    #mediaViewer video{
      max-width:95vw;
      max-height:90vh;
      border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }

    @media (max-width:700px){
      .top-actions{
        position:static;
        justify-content:center;
        margin-top:10px;
      }

      header{
        padding-bottom:10px;
      }

      .settings-actions{
        grid-template-columns:1fr;
      }

      .msg{
        max-width:88%;
      }

      footer{
        flex-wrap:wrap;
      }

      .ghost-btn, button{
        width:100%;
      }

      .attachment-chip,
      .reply-chip{
        align-items:flex-start;
      }

      .attachment-chip .chip-main,
      .reply-chip .chip-main{
        flex-direction:column;
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>

  <header>
    الشات الخاص 🤍
    <div class="top-actions">
      <button id="settingsBtn" class="top-btn">الإعدادات</button>
      <button id="adminBtn" class="top-btn hidden">لوحة الأدمن</button>
      <button id="logoutBtn" class="top-btn">خروج</button>
    </div>
  </header>

  <div id="statusBar">جاري التحقق من الجلسة...</div>

  <div id="loadingView">
    <div class="state-box">
      <h2 id="loadingTitle">جاري التحميل</h2>
      <p id="loadingText">لحظة من فضلك...</p>
    </div>
  </div>

  <div id="replyPreviewBox"></div>
  <div id="attachmentPreviewBox"></div>

  <div id="messages" class="hidden"></div>

  <footer id="chatFooter" class="hidden">
    <input id="text" type="text" placeholder="اكتب رسالة..." />
    <input id="attachmentInput" type="file" accept="image/*,video/*,audio/*" />
    <button id="pickAttachmentBtn" class="ghost-btn" title="مرفق">📎</button>
    <button id="recordBtn" class="ghost-btn" title="تسجيل صوت">🎙️</button>
    <button id="send">إرسال</button>
  </footer>

  <div id="settingsOverlay">
    <div id="settingsPanel">
      <h2>إعدادات الشات</h2>

      <div class="setting-group">
        <label for="bgSelect">خلفية الشات</label>
        <select id="bgSelect">
          <option value="#0f172a">أزرق داكن</option>
          <option value="#111827">رمادي داكن</option>
          <option value="#0b1020">ليلي عميق</option>
          <option value="#1f2937">رمادي مزرق</option>
          <option value="#172554">كحلي</option>
          <option value="#3f3f46">رصاصي</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="mineColor">لون رسائلي</label>
        <input id="mineColor" type="color" value="#2563eb" />
      </div>

      <div class="setting-group">
        <label for="otherColor">لون رسائل الطرف الآخر</label>
        <input id="otherColor" type="color" value="#1e293b" />
      </div>

      <div class="setting-group">
        <label for="fontSize">حجم الخط</label>
        <select id="fontSize">
          <option value="14px">صغير</option>
          <option value="15px" selected>متوسط</option>
          <option value="16px">كبير</option>
          <option value="18px">أكبر</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="bubbleRadius">استدارة الفقاعات</label>
        <select id="bubbleRadius">
          <option value="8px">خفيفة</option>
          <option value="12px" selected>متوسطة</option>
          <option value="18px">ناعمة</option>
          <option value="24px">مستديرة جدًا</option>
        </select>
      </div>

      <div class="setting-group">
        <label>معاينة</label>
        <div class="preview-box">
          <div class="preview-bubble other">هذه رسالة تجريبية من الطرف الآخر</div>
          <div class="preview-bubble mine">وهذه رسالتك أنت</div>
        </div>
      </div>

      <div class="settings-actions">
        <button id="saveSettingsBtn">حفظ</button>
        <button id="resetSettingsBtn" class="top-btn" style="width:100%;background:#475569;">إعادة الافتراضي</button>
        <button id="closeSettingsBtn" class="top-btn" style="width:100%;background:#334155;">إغلاق</button>
      </div>
    </div>
  </div>

  <div id="mediaViewer"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient(
    'https://vbwtsnxrshgjqmbgtagw.supabase.co',
    'sb_publishable_esJOtB6hRNf48Uo61txcyg_9F3yolJO'
  )

  const messagesBox = document.getElementById('messages')
  const input = document.getElementById('text')
  const sendBtn = document.getElementById('send')
  const chatFooter = document.getElementById('chatFooter')
  const loadingView = document.getElementById('loadingView')
  const loadingTitle = document.getElementById('loadingTitle')
  const loadingText = document.getElementById('loadingText')
  const statusBar = document.getElementById('statusBar')
  const logoutBtn = document.getElementById('logoutBtn')
  const adminBtn = document.getElementById('adminBtn')
  const settingsBtn = document.getElementById('settingsBtn')

  const settingsOverlay = document.getElementById('settingsOverlay')
  const bgSelect = document.getElementById('bgSelect')
  const mineColor = document.getElementById('mineColor')
  const otherColor = document.getElementById('otherColor')
  const fontSize = document.getElementById('fontSize')
  const bubbleRadius = document.getElementById('bubbleRadius')
  const saveSettingsBtn = document.getElementById('saveSettingsBtn')
  const resetSettingsBtn = document.getElementById('resetSettingsBtn')
  const closeSettingsBtn = document.getElementById('closeSettingsBtn')

  const attachmentInput = document.getElementById('attachmentInput')
  const pickAttachmentBtn = document.getElementById('pickAttachmentBtn')
  const recordBtn = document.getElementById('recordBtn')
  const attachmentPreviewBox = document.getElementById('attachmentPreviewBox')
  const replyPreviewBox = document.getElementById('replyPreviewBox')
  const mediaViewer = document.getElementById('mediaViewer')

  let currentUser = null
  let currentRole = 'member'
  let currentEmail = ''
  let renderedMessageIds = new Set()
  let accountStatusTimer = null
  let selectedAttachmentFile = null
  let selectedReplyMessageId = null
  let mediaRecorder = null
  let mediaStream = null
  let recordedChunks = []
  let isRecording = false
  let realtimeChannel = null
  let activeSwipe = null

  const messageMap = new Map()

  const defaultSettings = {
    bg: '#0f172a',
    mine: '#2563eb',
    other: '#1e293b',
    fontSize: '15px',
    bubbleRadius: '12px'
  }

  const REPLY_SWIPE_THRESHOLD = 72
  const REPLY_SWIPE_MAX = 96
  const SWIPE_LOCK_THRESHOLD = 12

  function setStatus(text) {
    statusBar.textContent = text
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;')
  }

  function formatTime(iso) {
    const d = new Date(iso)
    return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' })
  }

  function showChat() {
    loadingView.classList.add('hidden')
    messagesBox.classList.remove('hidden')
    chatFooter.classList.remove('hidden')
  }

  function hideChat() {
    messagesBox.classList.add('hidden')
    chatFooter.classList.add('hidden')
    loadingView.classList.remove('hidden')
  }

  function getDisplayNameFromEmail(email) {
    if (!email) return 'مستخدم'
    return email.split('@')[0]
  }

  function isNearBottom() {
    return messagesBox.scrollHeight - messagesBox.scrollTop - messagesBox.clientHeight < 120
  }

  function scrollToBottom() {
    messagesBox.scrollTop = messagesBox.scrollHeight
  }

  function getChatSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem('chat_settings_v1') || '{}')
      return { ...defaultSettings, ...saved }
    } catch {
      return { ...defaultSettings }
    }
  }

  function saveChatSettings(settings) {
    localStorage.setItem('chat_settings_v1', JSON.stringify(settings))
  }

  function applyChatSettings(settings) {
    document.documentElement.style.setProperty('--bg', settings.bg)
    document.documentElement.style.setProperty('--mine', settings.mine)
    document.documentElement.style.setProperty('--other', settings.other)
    document.documentElement.style.setProperty('--chat-font-size', settings.fontSize)
    document.documentElement.style.setProperty('--bubble-radius', settings.bubbleRadius)

    bgSelect.value = settings.bg
    mineColor.value = settings.mine
    otherColor.value = settings.other
    fontSize.value = settings.fontSize
    bubbleRadius.value = settings.bubbleRadius
  }

  function openSettings() {
    settingsOverlay.style.display = 'flex'
  }

  function closeSettings() {
    settingsOverlay.style.display = 'none'
  }

  function openMediaViewer(type, url) {
    if (type === 'image') {
      mediaViewer.innerHTML = `<img src="${url}" alt="صورة">`
    } else if (type === 'video') {
      mediaViewer.innerHTML = `<video src="${url}" controls autoplay></video>`
    } else {
      return
    }
    mediaViewer.style.display = 'flex'
  }

  function closeMediaViewer() {
    mediaViewer.innerHTML = ''
    mediaViewer.style.display = 'none'
  }

  function getAttachmentType(fileOrMime) {
    const value = String(fileOrMime || '')
    if (value.startsWith('image/')) return 'image'
    if (value.startsWith('video/')) return 'video'
    if (value.startsWith('audio/')) return 'audio'
    return 'unknown'
  }

  function getAttachmentLabel(type) {
    if (type === 'image') return '📷 صورة'
    if (type === 'video') return '🎬 فيديو'
    if (type === 'audio') return '🎵 صوت'
    return '📎 مرفق'
  }

  function getMessagePreviewText(msg) {
    if (!msg) return 'رسالة غير متوفرة'
    if (msg.content && String(msg.content).trim()) {
      return String(msg.content).trim()
    }
    if (msg.attachment_type) {
      return getAttachmentLabel(msg.attachment_type)
    }
    return 'رسالة'
  }

  function getMessageSenderName(msg) {
    if (!msg) return 'مستخدم'
    return msg.user_id === currentUser?.id ? 'أنت' : (msg.sender_name || 'مستخدم')
  }

  function updateAttachmentPreviewUI() {
    if (!selectedAttachmentFile) {
      attachmentPreviewBox.style.display = 'none'
      attachmentPreviewBox.innerHTML = ''
      return
    }

    const type = getAttachmentType(selectedAttachmentFile.type)
    let previewHtml = ''

    if (type === 'audio') {
      const audioUrl = URL.createObjectURL(selectedAttachmentFile)
      previewHtml = `<audio controls src="${audioUrl}"></audio>`
    }

    attachmentPreviewBox.style.display = 'block'
    attachmentPreviewBox.innerHTML = `
      <div class="attachment-chip">
        <div class="chip-main">
          <span class="chip-text">المرفق المختار: ${escapeHtml(selectedAttachmentFile.name)}</span>
          ${previewHtml}
        </div>
        <button class="remove" id="removeAttachmentBtn" title="إلغاء">×</button>
      </div>
    `

    document.getElementById('removeAttachmentBtn').addEventListener('click', clearSelectedAttachment)
  }

  function updateReplyPreviewUI() {
    if (!selectedReplyMessageId) {
      replyPreviewBox.style.display = 'none'
      replyPreviewBox.innerHTML = ''
      return
    }

    const msg = messageMap.get(selectedReplyMessageId)
    const senderName = getMessageSenderName(msg)
    const previewText = getMessagePreviewText(msg)

    replyPreviewBox.style.display = 'block'
    replyPreviewBox.innerHTML = `
      <div class="reply-chip">
        <div class="chip-main">
          <span class="chip-text">الرد على: ${escapeHtml(senderName)} — ${escapeHtml(previewText)}</span>
        </div>
        <button class="remove" id="removeReplyBtn" title="إلغاء الرد">×</button>
      </div>
    `

    document.getElementById('removeReplyBtn').addEventListener('click', clearReplySelection)
  }

  function clearSelectedAttachment() {
    selectedAttachmentFile = null
    attachmentInput.value = ''
    updateAttachmentPreviewUI()
  }

  function clearReplySelection() {
    selectedReplyMessageId = null
    updateReplyPreviewUI()
  }

  function startReplyToMessage(messageId) {
    if (!messageMap.has(messageId)) return
    selectedReplyMessageId = messageId
    updateReplyPreviewUI()
    input.focus()
  }

  function stopMediaStreamTracks() {
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop())
      mediaStream = null
    }
  }

  async function startRecording() {
    if (selectedAttachmentFile) {
      alert('ألغِ المرفق الحالي أولًا قبل بدء التسجيل')
      return
    }

    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true })
      mediaRecorder = new MediaRecorder(mediaStream)
      recordedChunks = []

      mediaRecorder.addEventListener('dataavailable', (event) => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data)
        }
      })

      mediaRecorder.addEventListener('stop', () => {
        const mimeType = mediaRecorder.mimeType || 'audio/webm'
        const extension = mimeType.includes('ogg') ? 'ogg' : 'webm'
        const audioBlob = new Blob(recordedChunks, { type: mimeType })
        const fileName = `recording_${Date.now()}.${extension}`
        selectedAttachmentFile = new File([audioBlob], fileName, { type: mimeType })
        updateAttachmentPreviewUI()
        stopMediaStreamTracks()
      })

      mediaRecorder.start()
      isRecording = true
      recordBtn.textContent = '⏹️'
      recordBtn.classList.add('recording-btn')
      setStatus(`جاري تسجيل الصوت... | ${currentEmail} | الصلاحية: ${currentRole}`)
    } catch (err) {
      alert('تعذر الوصول إلى الميكروفون. تأكد من السماح للمتصفح باستخدامه.')
      stopMediaStreamTracks()
    }
  }

  function stopRecording() {
    if (!mediaRecorder || !isRecording) return
    mediaRecorder.stop()
    isRecording = false
    recordBtn.textContent = '🎙️'
    recordBtn.classList.remove('recording-btn')
    setStatus(`تم تجهيز التسجيل الصوتي | ${currentEmail} | الصلاحية: ${currentRole}`)
  }

  async function requireSession() {
    const { data, error } = await supabase.auth.getSession()
    if (error) throw error

    const user = data.session?.user
    if (!user || user.is_anonymous || !user.email) {
      window.location.href = 'login.html'
      throw new Error('لا توجد جلسة تسجيل دخول صالحة')
    }

    return user
  }

  async function getRole(userId) {
    const { data, error } = await supabase
      .from('user_roles')
      .select('role')
      .eq('id', userId)
      .maybeSingle()

    if (error) throw error
    return data?.role || 'member'
  }

  async function getMyAccountStatus() {
    const { data, error } = await supabase.rpc('get_my_account_status')
    if (error) throw error

    if (Array.isArray(data)) {
      return data[0] || null
    }

    return data || null
  }

  function isCurrentlyBanned(statusRow) {
    if (!statusRow || !statusRow.banned_until) return false
    return new Date(statusRow.banned_until).getTime() > Date.now()
  }

  async function enforceNotBanned() {
    const statusRow = await getMyAccountStatus()

    if (isCurrentlyBanned(statusRow)) {
      hideChat()
      loadingTitle.textContent = 'تم منع الوصول'
      loadingText.textContent = 'هذا الحساب محظور حاليًا ولا يمكنه استخدام الشات.'
      setStatus('الحساب محظور')
      input.disabled = true
      sendBtn.disabled = true
      clearSelectedAttachment()
      clearReplySelection()
      if (isRecording) stopRecording()
      closeSettings()
      throw new Error('الحساب محظور')
    }

    input.disabled = false
    sendBtn.disabled = false
  }

  function startAccountStatusWatcher() {
    if (accountStatusTimer) {
      clearInterval(accountStatusTimer)
    }

    accountStatusTimer = setInterval(async () => {
      try {
        await enforceNotBanned()
      } catch {
        clearInterval(accountStatusTimer)
      }
    }, 15000)
  }

  async function createSignedAttachmentUrl(path) {
    const { data, error } = await supabase
      .storage
      .from('chat')
      .createSignedUrl(path, 3600)

    if (error) throw error
    return data?.signedUrl || ''
  }

  function sanitizeFileName(name) {
    return name.replace(/[^\w.\-]+/g, '_')
  }

  async function uploadAttachment(file) {
    const safeName = sanitizeFileName(file.name)
    const filePath = `${currentUser.id}/${Date.now()}_${safeName}`

    const { error } = await supabase
      .storage
      .from('chat')
      .upload(filePath, file, {
        cacheControl: '3600',
        upsert: false,
        contentType: file.type
      })

    if (error) throw error
    return filePath
  }

  function getClientPoint(event) {
    if (event.touches?.length) {
      return {
        x: event.touches[0].clientX,
        y: event.touches[0].clientY
      }
    }

    if (event.changedTouches?.length) {
      return {
        x: event.changedTouches[0].clientX,
        y: event.changedTouches[0].clientY
      }
    }

    return {
      x: event.clientX,
      y: event.clientY
    }
  }

  function resetSwipeVisuals(wrap, bubble) {
    if (!wrap || !bubble) return
    wrap.classList.remove('swiping', 'show-indicator', 'reply-ready')
    bubble.style.transform = 'translateX(0px)'
  }

  function animateSwipeBack(wrap, bubble) {
    if (!wrap || !bubble) return
    wrap.classList.remove('swiping', 'reply-ready')
    wrap.classList.add('show-indicator')
    bubble.style.transition = 'transform .18s ease'
    bubble.style.transform = 'translateX(0px)'
    window.setTimeout(() => {
      wrap.classList.remove('show-indicator')
      bubble.style.transition = ''
    }, 180)
  }

  function beginSwipe(event, wrap, bubble, msg) {
    if (!msg?.id) return
    if (event.button !== undefined && event.button !== 0) return

    const target = event.target
    if (
      target.closest('audio') ||
      target.closest('video') ||
      target.closest('img') ||
      target.closest('button') ||
      target.closest('a') ||
      target.closest('input') ||
      target.closest('textarea')
    ) {
      return
    }

    const point = getClientPoint(event)
    activeSwipe = {
      wrap,
      bubble,
      msg,
      startX: point.x,
      startY: point.y,
      deltaX: 0,
      deltaY: 0,
      locked: null,
      pointerType: event.type.startsWith('mouse') ? 'mouse' : 'touch'
    }

    wrap.classList.add('show-indicator')
  }

  function moveSwipe(event) {
    if (!activeSwipe) return

    const point = getClientPoint(event)
    activeSwipe.deltaX = point.x - activeSwipe.startX
    activeSwipe.deltaY = point.y - activeSwipe.startY

    if (activeSwipe.locked === null) {
      if (
        Math.abs(activeSwipe.deltaX) < SWIPE_LOCK_THRESHOLD &&
        Math.abs(activeSwipe.deltaY) < SWIPE_LOCK_THRESHOLD
      ) {
        return
      }

      activeSwipe.locked =
        Math.abs(activeSwipe.deltaX) > Math.abs(activeSwipe.deltaY)
          ? 'horizontal'
          : 'vertical'
    }

    if (activeSwipe.locked === 'vertical') {
      activeSwipe.wrap.classList.remove('show-indicator', 'reply-ready')
      return
    }

    const isMine = activeSwipe.msg.user_id === currentUser.id
    let swipeDistance = 0

    if (isMine) {
      swipeDistance = Math.max(0, -activeSwipe.deltaX)
      activeSwipe.bubble.style.transform = `translateX(${-Math.min(swipeDistance, REPLY_SWIPE_MAX)}px)`
    } else {
      swipeDistance = Math.max(0, activeSwipe.deltaX)
      activeSwipe.bubble.style.transform = `translateX(${Math.min(swipeDistance, REPLY_SWIPE_MAX)}px)`
    }

    activeSwipe.wrap.classList.add('swiping', 'show-indicator')

    if (swipeDistance >= REPLY_SWIPE_THRESHOLD) {
      activeSwipe.wrap.classList.add('reply-ready')
    } else {
      activeSwipe.wrap.classList.remove('reply-ready')
    }

    if (event.cancelable) {
      event.preventDefault()
    }
  }

  function endSwipe() {
    if (!activeSwipe) return

    const { wrap, bubble, msg, locked } = activeSwipe
    let didReply = false

    if (locked === 'horizontal') {
      const isMine = msg.user_id === currentUser.id
      const swipeDistance = isMine
        ? Math.max(0, -activeSwipe.deltaX)
        : Math.max(0, activeSwipe.deltaX)

      if (swipeDistance >= REPLY_SWIPE_THRESHOLD) {
        startReplyToMessage(msg.id)
        didReply = true
      }
    }

    animateSwipeBack(wrap, bubble)

    if (didReply) {
      setStatus(`تم تحديد رسالة للرد | ${currentEmail} | الصلاحية: ${currentRole}`)
    }

    activeSwipe = null
  }

  function cancelSwipe() {
    if (!activeSwipe) return
    animateSwipeBack(activeSwipe.wrap, activeSwipe.bubble)
    activeSwipe = null
  }

  function attachSwipeHandlers(wrap, bubble, msg) {
    wrap.addEventListener('touchstart', (e) => beginSwipe(e, wrap, bubble, msg), { passive: true })
    wrap.addEventListener('touchmove', moveSwipe, { passive: false })
    wrap.addEventListener('touchend', endSwipe)
    wrap.addEventListener('touchcancel', cancelSwipe)

    wrap.addEventListener('mousedown', (e) => beginSwipe(e, wrap, bubble, msg))
  }

  document.addEventListener('mousemove', moveSwipe)
  document.addEventListener('mouseup', endSwipe)

  async function loadMessages() {
    const { data, error } = await supabase
      .from('chat_messages')
      .select('*')
      .order('created_at', { ascending: true })

    if (error) throw error

    messagesBox.innerHTML = ''
    renderedMessageIds.clear()
    messageMap.clear()

    for (const msg of data) {
      if (msg?.id != null) {
        messageMap.set(msg.id, msg)
      }
    }

    for (const msg of data) {
      await renderMessage(msg)
    }

    scrollToBottom()
  }

  function createReplyHtml(msg) {
    if (!msg.reply_to_id) return ''

    const repliedMsg = messageMap.get(msg.reply_to_id)
    const repliedName = getMessageSenderName(repliedMsg)
    const repliedText = getMessagePreviewText(repliedMsg)

    return `
      <div class="msg-reply-box">
        <div class="msg-reply-name">${escapeHtml(repliedName)}</div>
        <div class="msg-reply-text">${escapeHtml(repliedText)}</div>
      </div>
    `
  }

  async function renderMessage(msg) {
    if (msg?.id && renderedMessageIds.has(msg.id)) return
    if (msg?.id) {
      renderedMessageIds.add(msg.id)
      messageMap.set(msg.id, msg)
    }

    const wrap = document.createElement('div')
    wrap.className = 'msg-wrap'
    wrap.dataset.messageId = String(msg.id || '')
    wrap.classList.add(msg.user_id === currentUser.id ? 'mine' : 'other')

    const bubble = document.createElement('div')
    bubble.className = 'msg'
    if (msg.user_id === currentUser.id) {
      bubble.classList.add('mine')
    }

    const senderName = getMessageSenderName(msg)

    bubble.innerHTML = `
      <div class="name">${escapeHtml(senderName)}</div>
      ${createReplyHtml(msg)}
      ${msg.content ? `<div>${escapeHtml(msg.content)}</div>` : ''}
      <div class="attachment-placeholder hidden">جاري تحميل المرفق...</div>
      <div class="meta">${formatTime(msg.created_at)}</div>
    `

    const indicator = document.createElement('div')
    indicator.className = 'reply-swipe-indicator'
    indicator.textContent = '↩'

    wrap.appendChild(indicator)
    wrap.appendChild(bubble)
    messagesBox.appendChild(wrap)

    attachSwipeHandlers(wrap, bubble, msg)

    if (msg.attachment_path && msg.attachment_type) {
      const placeholder = bubble.querySelector('.attachment-placeholder')
      placeholder.classList.remove('hidden')

      try {
        const signedUrl = await createSignedAttachmentUrl(msg.attachment_path)

        if (msg.attachment_type === 'image') {
          const img = document.createElement('img')
          img.className = 'attachment'
          img.src = signedUrl
          img.alt = 'صورة'
          img.loading = 'lazy'
          img.addEventListener('click', () => openMediaViewer('image', signedUrl))
          placeholder.replaceWith(img)
        } else if (msg.attachment_type === 'video') {
          const video = document.createElement('video')
          video.className = 'attachment'
          video.src = signedUrl
          video.controls = true
          video.preload = 'metadata'
          video.addEventListener('click', () => openMediaViewer('video', signedUrl))
          placeholder.replaceWith(video)
        } else if (msg.attachment_type === 'audio') {
          const audio = document.createElement('audio')
          audio.className = 'attachment'
          audio.src = signedUrl
          audio.controls = true
          audio.preload = 'metadata'
          placeholder.replaceWith(audio)
        } else {
          placeholder.textContent = 'نوع مرفق غير مدعوم'
        }
      } catch {
        placeholder.textContent = 'تعذر تحميل المرفق'
      }
    }
  }

  async function sendMessage() {
    const text = input.value.trim()
    const file = selectedAttachmentFile

    if (!text && !file) return

    try {
      await enforceNotBanned()
    } catch {
      return
    }

    let attachmentType = null
    if (file) {
      attachmentType = getAttachmentType(file.type)

      if (attachmentType === 'unknown') {
        alert('النوع المدعوم فقط: صورة أو فيديو أو صوت')
        return
      }

      if (file.size > 20 * 1024 * 1024) {
        alert('حجم المرفق يجب أن يكون أقل من 20MB')
        return
      }
    }

    sendBtn.disabled = true
    pickAttachmentBtn.disabled = true
    recordBtn.disabled = true

    try {
      let attachmentPath = null

      if (file) {
        attachmentPath = await uploadAttachment(file)
      }

      const insertPayload = {
        user_id: currentUser.id,
        content: text || null,
        sender_name: getDisplayNameFromEmail(currentEmail),
        attachment_path: attachmentPath,
        attachment_type: attachmentType,
        reply_to_id: selectedReplyMessageId || null
      }

      const { error } = await supabase
        .from('chat_messages')
        .insert(insertPayload)

      if (error) throw error

      input.value = ''
      clearSelectedAttachment()
      clearReplySelection()
    } catch (err) {
      alert(err.message || 'تعذر إرسال الرسالة')
    } finally {
      sendBtn.disabled = false
      pickAttachmentBtn.disabled = false
      recordBtn.disabled = false
    }
  }

  async function initRealtime() {
    if (realtimeChannel) {
      await supabase.removeChannel(realtimeChannel)
    }

    realtimeChannel = supabase
      .channel('chat_messages_live_v9')
      .on(
        'postgres_changes',
        {
          event: 'INSERT',
          schema: 'public',
          table: 'chat_messages'
        },
        async (payload) => {
          const shouldScroll = isNearBottom()
          await renderMessage(payload.new)
          if (shouldScroll) {
            scrollToBottom()
          }
        }
      )
      .subscribe()
  }

  async function logout() {
    if (accountStatusTimer) {
      clearInterval(accountStatusTimer)
    }
    if (isRecording) {
      stopRecording()
    }
    stopMediaStreamTracks()
    clearReplySelection()
    await supabase.auth.signOut()
    window.location.href = 'login.html'
  }

  function handleSaveSettings() {
    const settings = {
      bg: bgSelect.value,
      mine: mineColor.value,
      other: otherColor.value,
      fontSize: fontSize.value,
      bubbleRadius: bubbleRadius.value
    }

    saveChatSettings(settings)
    applyChatSettings(settings)
    closeSettings()
    setStatus(`تم حفظ الإعدادات | ${currentEmail} | الصلاحية: ${currentRole}`)
  }

  function handleResetSettings() {
    saveChatSettings(defaultSettings)
    applyChatSettings(defaultSettings)
    setStatus(`تمت إعادة الإعدادات الافتراضية | ${currentEmail} | الصلاحية: ${currentRole}`)
  }

  async function init() {
    try {
      applyChatSettings(getChatSettings())

      currentUser = await requireSession()
      currentEmail = currentUser.email || ''
      currentRole = await getRole(currentUser.id)

      await enforceNotBanned()

      setStatus(`تم تسجيل الدخول: ${currentEmail} | الصلاحية: ${currentRole}`)

      if (currentRole === 'admin') {
        adminBtn.classList.remove('hidden')
      }

      showChat()
      await loadMessages()
      await initRealtime()
      startAccountStatusWatcher()
    } catch (err) {
      console.error(err)
      if (String(err.message || '').includes('محظور')) return
      loadingText.textContent = err.message || 'حدث خطأ'
    }
  }

  sendBtn.addEventListener('click', sendMessage)

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage()
  })

  pickAttachmentBtn.addEventListener('click', () => {
    if (isRecording) return
    attachmentInput.click()
  })

  attachmentInput.addEventListener('change', () => {
    selectedAttachmentFile = attachmentInput.files?.[0] || null
    updateAttachmentPreviewUI()
  })

  recordBtn.addEventListener('click', async () => {
    if (isRecording) {
      stopRecording()
    } else {
      await startRecording()
    }
  })

  logoutBtn.addEventListener('click', logout)

  adminBtn.addEventListener('click', () => {
    window.location.href = 'admin.html'
  })

  settingsBtn.addEventListener('click', openSettings)
  closeSettingsBtn.addEventListener('click', closeSettings)
  saveSettingsBtn.addEventListener('click', handleSaveSettings)
  resetSettingsBtn.addEventListener('click', handleResetSettings)

  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) {
      closeSettings()
    }
  })

  mediaViewer.addEventListener('click', () => {
    closeMediaViewer()
  })

  init()
</script>
