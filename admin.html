<!-- admin.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الأدمن</title>

<style>

body{
background:#0f172a;
color:white;
font-family:tahoma;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
color:white;
}

.btn{
background:#2563eb;
}

.btn-danger{
background:#ef4444;
}

.btn-gray{
background:#475569;
}

select{
padding:8px;
margin-top:10px;
width:100%;
background:#0b1220;
color:white;
border:1px solid #334155;
border-radius:6px;
}

.item{
border:1px solid #334155;
padding:15px;
margin-top:10px;
border-radius:10px;
}

.badge{
background:#334155;
padding:3px 7px;
border-radius:20px;
font-size:12px;
margin-right:5px;
}

.badge-ban{
background:#ef4444;
}

</style>
</head>


<body>

<div class="card">

<h2>لوحة الأدمن</h2>

<button class="btn" id="reloadBtn">تحديث اللوحة</button>
<button class="btn-gray" id="goChatBtn">الرجوع للشات</button>
<button class="btn-danger" id="logoutBtn">تسجيل الخروج</button>

</div>

<div class="card">

<h3>الحالة</h3>

<div id="statusBox">جاري التحقق...</div>

</div>

<div class="card">

<h3>المستخدمون</h3>

<div id="usersList"></div>

</div>


<script type="module">

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
'https://vbwtsnxrshgjqmbgtagw.supabase.co',
'sb_publishable_esJOtB6hRNf48Uo61txcyg_9F3yolJO'
)

const usersList=document.getElementById('usersList')
const statusBox=document.getElementById('statusBox')

let currentUser=null

function setStatus(msg){
statusBox.innerText=msg
}

async function requireSession(){

const {data}=await supabase.auth.getSession()

if(!data.session){

location.href='login.html'
throw new Error('no session')

}

return data.session.user

}

async function getRole(id){

const {data}=await supabase
.from('user_roles')
.select('role')
.eq('id',id)
.single()

return data.role

}

async function loadUsers(){

const {data}=await supabase
.from('admin_users_view')
.select('*')

return data

}

async function setUserRole(id,role){

await supabase
.from('user_roles')
.update({role})
.eq('id',id)

}

async function banUser(userId,ban){

const {data,error}=await supabase.functions.invoke(
'ban-user-by-admin',
{
body:{user_id:userId,ban}
}
)

if(error)throw error

return data

}

async function deleteUser(userId){

const {data,error}=await supabase.functions.invoke(
'delete-user-by-admin',
{
body:{user_id:userId}
}
)

if(error)throw error

return data

}

async function renderUsers(){

usersList.innerHTML=''

const users=await loadUsers()

users.forEach(user=>{

const banned=user.banned_until?true:false

const div=document.createElement('div')
div.className='item'

div.innerHTML=`

<div>

<b>${user.email}</b>

<span class="badge">${user.role}</span>

${banned?'<span class="badge badge-ban">محظور</span>':''}

</div>

<div style="margin-top:10px">

<select class="roleSelect">

<option value="member" ${user.role==='member'?'selected':''}>member</option>
<option value="admin" ${user.role==='admin'?'selected':''}>admin</option>

</select>

<button class="btn saveRole">حفظ الدور</button>

<button class="btn-danger banUser">حظر</button>

<button class="btn-gray unbanUser">فك الحظر</button>

<button class="btn-danger deleteUser">حذف المستخدم</button>

</div>

`

div.querySelector('.saveRole').onclick=async()=>{

await setUserRole(user.id,div.querySelector('.roleSelect').value)

setStatus('تم حفظ الدور')

run()

}

div.querySelector('.banUser').onclick=async()=>{

await banUser(user.id,true)

setStatus('تم حظر المستخدم')

run()

}

div.querySelector('.unbanUser').onclick=async()=>{

await banUser(user.id,false)

setStatus('تم فك الحظر')

run()

}

div.querySelector('.deleteUser').onclick=async()=>{

if(!confirm('هل أنت متأكد من حذف المستخدم؟'))return

await deleteUser(user.id)

setStatus('تم حذف المستخدم')

run()

}

usersList.appendChild(div)

})

}

async function run(){

currentUser=await requireSession()

const role=await getRole(currentUser.id)

if(role!=='admin'){

setStatus('ليس لديك صلاحية')

return

}

await renderUsers()

setStatus('تم تحميل لوحة الأدمن')

}

document.getElementById('reloadBtn').onclick=run

document.getElementById('logoutBtn').onclick=async()=>{

await supabase.auth.signOut()

location.href='login.html'

}

document.getElementById('goChatBtn').onclick=()=>{

location.href='chat.html'

}

run()

</script>

</body>
</html>
