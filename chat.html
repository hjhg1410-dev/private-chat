<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>شات متكامل ومستقر</title>

<style>
:root{
  --bg:#0f172a;
  --header:#1e293b;
  --footer:#1e293b;
  --mine:#2563eb;
  --other:#1f2937;
  --border:#334155;
  --text:#ffffff;
  --muted:#cbd5e1;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --reply-accent:#86efac;
}

*{ box-sizing:border-box; margin:0; padding:0; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: tahoma, sans-serif;
  color: var(--text);
  touch-action: none; /* منع حركات المتصفح الافتراضية المزعجة */
}

/* الحاوية الرئيسية مرنة لتتفاعل مع الكيبورد */
.app {
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%; /* سيتم تحديثه برمجياً عند فتح الكيبورد */
  overflow: hidden;
  background: radial-gradient(circle at top right, rgba(37,99,235,.1), transparent 40%);
}

header {
  flex-shrink: 0;
  background: var(--header);
  border-bottom: 1px solid var(--border);
  padding-top: var(--safe-top);
  z-index: 100;
}

.header-inner {
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

/* منطقة الرسائل تأخذ كل المساحة المتاحة */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 15px 10px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  -webkit-overflow-scrolling: touch;
}

.msg-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  transition: transform .16s ease;
  will-change: transform;
}

.msg-wrap.me { align-items: flex-end; }
.msg-wrap.other { align-items: flex-start; }

.msg {
  max-width: 80%;
  padding: 10px 12px;
  border-radius: 16px;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,.15);
}

.msg.me { background: var(--mine); border-bottom-right-radius: 4px; }
.msg.other { background: var(--other); border-bottom-left-radius: 4px; }

/* تصميم الرد داخل الرسالة */
.reply-box {
  background: rgba(255,255,255,.1);
  border-right: 3px solid var(--reply-accent);
  border-radius: 8px;
  padding: 6px 10px;
  margin-bottom: 6px;
  font-size: 12px;
}

.composer-shell {
  flex-shrink: 0;
  background: var(--footer);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
}

.reply-preview {
  padding: 8px 10px 0;
}

.reply-preview-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111827;
  border-right: 4px solid var(--reply-accent);
  border-radius: 10px;
  padding: 8px 12px;
}

footer {
  height: 65px;
  display: flex;
  gap: 8px;
  padding: 10px;
  align-items: center;
}

input {
  flex: 1;
  height: 44px;
  border: none;
  border-radius: 20px;
  padding: 0 16px;
  font-size: 16px;
  background: #fff;
}

.send-btn {
  background: var(--mine);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 0 18px;
  height: 44px;
  cursor: pointer;
}

.hidden { display: none !important; }

/* المنيو */
.menu-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: flex-end;
  z-index: 1000;
}

.menu-sheet {
  width: 100%;
  background: #1e293b;
  border-radius: 20px 20px 0 0;
  padding-bottom: var(--safe-bottom);
}

.menu-btn {
  width: 100%;
  padding: 18px;
  background: none;
  border: none;
  color: white;
  text-align: right;
  font-size: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.danger { color: #f87171; }
</style>
</head>
<body>

<div class="app" id="app">
  <header>
    <div class="header-inner">الشات الخاص 🤍</div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="composer-shell" id="composer">
    <div class="reply-preview hidden" id="replyPreview"></div>
    <footer>
      <input id="text" type="text" placeholder="اكتب رسالة..." autocomplete="off" />
      <button class="send-btn" id="sendBtn">إرسال</button>
    </footer>
  </div>
</div>

<div class="menu-overlay" id="menuOverlay">
  <div class="menu-sheet" id="menuActions"></div>
</div>

<script>
const app = document.getElementById('app');
const messagesEl = document.getElementById('messages');
const input = document.getElementById('text');
const sendBtn = document.getElementById('sendBtn');
const replyPreview = document.getElementById('replyPreview');
const menuOverlay = document.getElementById('menuOverlay');

let data = [
  { id: 1, mine: false, text: 'السلام عليكم', time: '10:10 ص' },
  { id: 2, mine: true, text: 'وعليكم السلام 🤍', time: '10:11 ص' }
];

let replyingToId = null;
let editingId = null;

// --- حل مشكلة الكيبورد الهيدر ---
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    app.style.height = `${window.visualViewport.height}px`;
    window.scrollTo(0, 0); 
    scrollToBottom();
  });
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderMessages() {
  messagesEl.innerHTML = '';
  data.forEach(msg => {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${msg.mine ? 'me' : 'other'}`;
    
    let replyHtml = '';
    if(msg.replyToId) {
      const orig = data.find(d => d.id === msg.replyToId);
      if(orig) {
        replyHtml = `<div class="reply-box">
          <strong>${orig.mine ? 'أنت' : 'الطرف الآخر'}</strong><br>${escapeHtml(orig.text)}
        </div>`;
      }
    }

    wrap.innerHTML = `
      <div style="position:absolute; right:-30px; top:50%; transform:translateY(-50%); opacity:0;" class="hint">↩️</div>
      <div class="msg ${msg.mine ? 'me' : 'other'}">
        ${replyHtml}
        <div class="msg-text">${escapeHtml(msg.text)}</div>
        <div style="font-size:10px; opacity:0.6; margin-top:4px; text-align:left">
          ${msg.edited ? '(معدلة) ' : ''}${msg.time}
        </div>
      </div>
    `;

    bindEvents(wrap, msg);
    messagesEl.appendChild(wrap);
  });
  scrollToBottom();
}

function bindEvents(wrap, msg) {
  let startX = 0;
  let timer;

  // الضغط المطول (المنيو)
  wrap.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    timer = setTimeout(() => openMenu(msg), 500);
  }, {passive: true});

  // السحب للرد
  wrap.addEventListener('touchmove', (e) => {
    let diff = e.touches[0].clientX - startX;
    if (diff > 10) {
      clearTimeout(timer);
      let move = Math.min(diff, 70);
      wrap.style.transform = `translateX(${move}px)`;
      wrap.querySelector('.hint').style.opacity = move / 60;
    }
  }, {passive: true});

  wrap.addEventListener('touchend', (e) => {
    clearTimeout(timer);
    let diff = e.changedTouches[0].clientX - startX;
    if (diff > 60) setReply(msg);
    wrap.style.transform = 'translateX(0)';
    wrap.querySelector('.hint').style.opacity = 0;
  });
}

function setReply(msg) {
  replyingToId = msg.id;
  editingId = null;
  replyPreview.innerHTML = `
    <div class="reply-preview-box">
      <div style="font-size:12px">الرد على: ${msg.text.substring(0,30)}</div>
      <button onclick="closeReply()" style="background:none; border:none; color:white; font-size:18px">×</button>
    </div>`;
  replyPreview.classList.remove('hidden');
  input.focus();
}

function closeReply() {
  replyingToId = null;
  replyPreview.classList.add('hidden');
}

function openMenu(msg) {
  if (navigator.vibrate) navigator.vibrate(20);
  const actions = document.getElementById('menuActions');
  actions.innerHTML = `
    <button class="menu-btn" onclick="copyMsg('${msg.text}')">نسخ النص</button>
    ${msg.mine ? `<button class="menu-btn" onclick="startEdit(${msg.id})">تعديل</button>` : ''}
    ${msg.mine ? `<button class="menu-btn danger" onclick="deleteMsg(${msg.id})">حذف الرسالة</button>` : ''}
    <button class="menu-btn" onclick="closeMenu()">إلغاء</button>
  `;
  menuOverlay.style.display = 'flex';
}

function closeMenu() { menuOverlay.style.display = 'none'; }

window.copyMsg = (text) => {
  navigator.clipboard.writeText(text);
  closeMenu();
};

window.deleteMsg = (id) => {
  data = data.filter(m => m.id !== id);
  renderMessages();
  closeMenu();
};

window.startEdit = (id) => {
  const msg = data.find(m => m.id === id);
  editingId = id;
  input.value = msg.text;
  closeMenu();
  input.focus();
};

sendBtn.addEventListener('click', () => {
  const text = input.value.trim();
  if(!text) return;

  if(editingId) {
    const msg = data.find(m => m.id === editingId);
    msg.text = text;
    msg.edited = true;
    editingId = null;
  } else {
    data.push({
      id: Date.now(),
      mine: true,
      text,
      time: new Date().toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'}),
      replyToId: replyingToId
    });
  }
  
  input.value = '';
  closeReply();
  renderMessages();
});

menuOverlay.onclick = (e) => { if(e.target === menuOverlay) closeMenu(); };

renderMessages();
</script>

</body>
</html>
