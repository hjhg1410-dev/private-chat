<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>اختبار شات محسن</title>

<style>
:root{
  --bg:#0f172a;
  --header:#1e293b;
  --footer:#1e293b;
  --mine:#2563eb;
  --other:#1f2937;
  --border:#334155;
  --text:#ffffff;
  --muted:#cbd5e1;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --reply-accent:#86efac;
  --header-total-h:72px;
  --composer-total-h:88px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:tahoma,sans-serif;
  color:var(--text);
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
}

body{
  position:fixed;
  inset:0;
  touch-action:none;
}

button,
input,
textarea{
  font-family:inherit;
}

.hidden{
  display:none !important;
}

.app{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    linear-gradient(rgba(15,23,42,.97), rgba(15,23,42,.97)),
    radial-gradient(circle at top right, rgba(37,99,235,.18), transparent 30%);
}

/* header fixed */
header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:50;
  background:var(--header);
  border-bottom:1px solid var(--border);
  padding-top:var(--safe-top);
}

.header-inner{
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 14px;
  font-size:18px;
  font-weight:bold;
}

/* messages only scroll */
.messages{
  position:fixed;
  top:var(--header-total-h);
  left:0;
  right:0;
  bottom:var(--composer-total-h);
  overflow-y:auto;
  overflow-x:hidden;
  padding:14px 10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:transparent;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  overscroll-behavior-x:none;
  touch-action:pan-y;
}

/* message wrappers */
.msg-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
  position:relative;
  transition:transform .16s ease;
  will-change:transform;
}

.msg-wrap.me{
  align-items:flex-end;
}

.msg-wrap.other{
  align-items:flex-start;
}

.reply-hint{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  opacity:0;
  transition:opacity .12s ease;
  font-size:18px;
  pointer-events:none;
}

.msg-wrap.swiping .reply-hint{
  opacity:1;
}

.msg-wrap.me .reply-hint{
  right:-24px;
}

.msg-wrap.other .reply-hint{
  left:-24px;
}

.msg{
  max-width:80%;
  padding:10px 12px 8px;
  border-radius:16px;
  word-break:break-word;
  overflow-wrap:anywhere;
  position:relative;
  box-shadow:0 6px 14px rgba(0,0,0,.16);

  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

.msg.me{
  background:var(--mine);
  border-bottom-right-radius:6px;
}

.msg.other{
  background:var(--other);
  border-bottom-left-radius:6px;
}

.reply-box{
  background:rgba(255,255,255,.11);
  border-right:3px solid var(--reply-accent);
  border-radius:10px;
  padding:7px 9px;
  margin-bottom:8px;
  font-size:12px;
  overflow:hidden;
}

.reply-name{
  font-weight:bold;
  margin-bottom:3px;
}

.reply-text{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  opacity:.95;
}

.msg-text{
  white-space:pre-wrap;
  line-height:1.45;
  font-size:15px;
  
  -webkit-user-select: none;
  user-select: none;
}

.msg-meta{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
  gap:6px;
  font-size:11px;
  color:rgba(255,255,255,.82);
}

/* composer fixed */
.composer-shell{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
  background:var(--footer);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}

.reply-preview{
  padding:8px 10px 0;
}

.reply-preview-box{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.07);
  border-right:4px solid var(--reply-accent);
  border-radius:12px;
  padding:10px 12px;
}

.reply-preview-main{
  min-width:0;
  flex:1;
}

.reply-preview-title{
  font-size:12px;
  font-weight:bold;
  margin-bottom:4px;
}

.reply-preview-text{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.reply-close{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  padding:0;
}

footer{
  min-height:76px;
  display:flex;
  gap:8px;
  padding:10px;
  background:var(--footer);
  align-items:flex-end;
  flex-wrap:nowrap;
  min-width:0;
  width:100%;
  max-width:100%;
  overflow:hidden;
}
  
textarea{
  flex:1;
  min-width:0;
  min-height:48px;
  max-height:96px;
  border:none;
  outline:none;
  border-radius:14px;
  padding:12px 14px;
  font-size:16px;
  background:#fff;
  color:#111827;
  resize:none;
  overflow-y:auto;
  line-height:1.45;
  white-space:pre-wrap;
  word-break:break-word;
}

button.send-btn{
  flex:0 0 auto;
  width:48px;
  min-width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
}

button.send-btn svg{
  width:22px;
  height:22px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.attach-btn{
  flex:0 0 auto;
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:#111827;
  color:#fff;
  font-size:28px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.attach-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  z-index:1100;
}

.attach-sheet{
  width:min(260px, calc(100% - 40px));
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.attach-head{
  display:none;
}

.attach-option{
  width:100%;
  background:transparent;
  border:none;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:8px;
  text-align:right;
  padding:11px 12px;
  font-size:14px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-direction:row-reverse;
}

.attach-option:last-child{
  border-bottom:none;
}

.attach-option-icon{
  width:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.attach-option-text{
  white-space:nowrap;
}

@media (max-width:420px){
  .attach-btn{
    width:46px;
    height:46px;
    font-size:26px;
  }
}

/* menu */
.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:1000;

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-center{
  width:min(260px, calc(100% - 40px));
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-inline:auto;
}
  
.menu-message-preview{
  display:flex;
  justify-content:flex-end;
  width:100%;
  pointer-events:none;
}

.menu-message-preview .preview-bubble{
  max-width:74%;
  max-height:170px;
  padding:9px 11px 8px;
  border-radius:15px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
  word-break:break-word;
  overflow-wrap:anywhere;
  overflow-y:auto;
}

.menu-message-preview .preview-bubble.me{
  background:var(--mine);
  border-bottom-right-radius:6px;
}

.menu-message-preview .preview-bubble.other{
  background:var(--other);
  border-bottom-left-radius:6px;
}

.menu-message-preview .preview-text{
  white-space:pre-wrap;
  line-height:1.45;
  font-size:15px;

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-message-preview .preview-meta{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
  font-size:11px;
  color:rgba(255,255,255,.82);
}

.menu-sheet{
  width:100%;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.35);

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-head{
  display:none;
}
  
.menu-btn{
  width:100%;
  background:transparent;
  border:none;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  text-align:right;
  padding:13px 18px;
  font-size:14px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-btn-label{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.menu-btn-icon{
  width:16px;
  height:16px;
  flex:0 0 16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  opacity:.95;
}

.menu-btn-icon svg{
  width:18px;
  height:18px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:1.9;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.menu-btn-text{
  white-space:nowrap;
}

.menu-btn:last-child{
  border-bottom:none;
}

.menu-btn.danger{
  color:#fca5a5;
}
@media (max-width:420px){
  .header-inner{
    min-height:54px;
    font-size:17px;
  }

  .msg{
    max-width:86%;
  }

  textarea{
    min-height:46px;
  }  

  .send-btn{
    width:46px;
    min-width:46px;
    height:46px;
  }
  .messages{
    -webkit-user-select: none;
    user-select: none;
  }
}
</style>
</head>
<body>

<div class="app">
  <header id="chatHeader">
    <div class="header-inner">الشات الخاص 🤍</div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="composer-shell" id="composerShell">
    <div class="reply-preview hidden" id="replyPreview"></div>

    <footer>
      <input id="imagePicker" type="file" accept="image/*" class="hidden" />
      <input id="videoPicker" type="file" accept="video/*" class="hidden" />
      <input id="filePicker" type="file" class="hidden" />
      <input id="audioPicker" type="file" accept="audio/*" class="hidden" />
    
      <button class="attach-btn" id="attachBtn" type="button" aria-label="إضافة مرفق">+</button>
      <textarea id="text" placeholder="اكتب رسالة..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" type="button" aria-label="إرسال أو تسجيل صوت"></button>
    </footer>
  </div>
</div>

<div class="menu-overlay" id="menuOverlay">
  <div class="menu-center">
    <div class="menu-message-preview" id="menuMessagePreview"></div>

    <div class="menu-sheet">
      <div class="menu-head" id="menuHead">خيارات الرسالة</div>
      <div id="menuActions"></div>
    </div>
  </div>
  </div>
    <div class="attach-overlay" id="attachOverlay">
    <div class="attach-sheet">
      <div class="attach-head">إرسال مرفق</div>
  
      <button class="attach-option" type="button" data-kind="image">
        <span class="attach-option-icon">🖼️</span>
        <span class="attach-option-text">صورة</span>
      </button>
  
      <button class="attach-option" type="button" data-kind="video">
        <span class="attach-option-icon">🎥</span>
        <span class="attach-option-text">فيديو</span>
      </button>
  
      <button class="attach-option" type="button" data-kind="file">
        <span class="attach-option-icon">📎</span>
        <span class="attach-option-text">ملف</span>
      </button>
  
      <button class="attach-option" type="button" data-kind="audio">
        <span class="attach-option-icon">🎤</span>
        <span class="attach-option-text">ملف صوت</span>
      </button>
    </div>
  </div>

<script>
const root = document.documentElement;
const headerEl = document.getElementById('chatHeader');
const composerShell = document.getElementById('composerShell');
const messagesEl = document.getElementById('messages');
const imagePicker = document.getElementById('imagePicker');
const videoPicker = document.getElementById('videoPicker');
const filePicker = document.getElementById('filePicker');
const audioPicker = document.getElementById('audioPicker');
const attachBtn = document.getElementById('attachBtn');
const input = document.getElementById('text');
const sendBtn = document.getElementById('sendBtn');
const replyPreview = document.getElementById('replyPreview');
const menuOverlay = document.getElementById('menuOverlay');
const menuHead = document.getElementById('menuHead');
const menuActions = document.getElementById('menuActions');
const menuMessagePreview = document.getElementById('menuMessagePreview');
const attachOverlay = document.getElementById('attachOverlay');
  
let replyingToId = null;
let editingId = null;
let menuTargetId = null;

let longPressTimer = null;
let pressStartX = 0;
let pressStartY = 0;
let isSwiping = false;
let swipeTarget = null;
let suppressClickUntil = 0;

const SWIPE_REPLY_THRESHOLD = 72;
const SWIPE_MAX = 90;
const LONG_PRESS_MS = 380;
const MOVE_CANCEL = 10;

const data = [
  { id: 1, mine: false, text: 'السلام عليكم', time: '10:10 ص' },
  { id: 2, mine: true, text: 'وعليكم السلام 🤍', time: '10:11 ص' },
  { id: 3, mine: false, text: 'هذه نسخة مستقرة، والآن نضيف عليها السحب للرد والضغط المطول.', time: '10:12 ص' },
  { id: 4, mine: true, text: 'ممتاز جدًا', time: '10:13 ص' }
];

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function getActionButtonIcon(mode) {
  if (mode === 'send') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M22 2L11 13"></path>
        <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
      </svg>
    `;
  }

  return `
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V6a3 3 0 0 1 3-3z"></path>
      <path d="M19 11a7 7 0 0 1-14 0"></path>
      <path d="M12 18v3"></path>
      <path d="M8 21h8"></path>
    </svg>
  `;
}

function updateComposerActionButton() {
  const hasText = input.value.trim().length > 0;
  const mode = hasText ? 'send' : 'mic';

  sendBtn.dataset.mode = mode;
  sendBtn.innerHTML = getActionButtonIcon(mode);
  sendBtn.setAttribute(
    'aria-label',
    mode === 'send' ? 'إرسال الرسالة' : 'تسجيل صوت'
  );
}
  
function autoGrowTextarea() {
  input.style.height = '48px';
  const nextHeight = Math.min(input.scrollHeight, 96);
  input.style.height = nextHeight + 'px';
}
  
function syncLayoutHeights() {

  const headerH = Math.ceil(headerEl.getBoundingClientRect().height);
  const composerH = Math.ceil(composerShell.getBoundingClientRect().height);

  root.style.setProperty('--header-total-h', `${headerH}px`);
  root.style.setProperty('--composer-total-h', `${composerH}px`);
}

function getMsgById(id) {
  return data.find(m => m.id === id) || null;
}

function buildReplyPreviewText(msg) {
  if (!msg) return 'رسالة';
  return msg.text?.trim() || 'رسالة';
}

function renderReplySnippet(msg) {
  if (!msg.replyToId) return '';
  const original = getMsgById(msg.replyToId);
  const name = original ? (original.mine ? 'أنت' : 'الطرف الآخر') : 'رسالة';
  const text = buildReplyPreviewText(original);

  return `
    <div class="reply-box">
      <div class="reply-name">${escapeHtml(name)}</div>
      <div class="reply-text">${escapeHtml(text)}</div>
    </div>
  `;
}

function renderMessages() {
  messagesEl.innerHTML = '';

  data.forEach(msg => {
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${msg.mine ? 'me' : 'other'}`;
    wrap.dataset.id = String(msg.id);

    wrap.innerHTML = `
      <div class="reply-hint">↩️</div>
      <div class="msg ${msg.mine ? 'me' : 'other'}">
        ${renderReplySnippet(msg)}
        <div class="msg-text">${escapeHtml(msg.text)}</div>
        <div class="msg-meta">
          ${msg.edited ? '<span>(تم التعديل)</span>' : ''}
          <span>${escapeHtml(msg.time)}</span>
        </div>
      </div>
    `;

    bindInteractions(wrap, msg);
    messagesEl.appendChild(wrap);
  });

  messagesEl.scrollTop = messagesEl.scrollHeight;
  requestAnimationFrame(syncLayoutHeights);
}

function clearReplyPreview() {
  replyingToId = null;
  replyPreview.classList.add('hidden');
  replyPreview.innerHTML = '';
  requestAnimationFrame(syncLayoutHeights);
}

function openReplyPreview(msgId) {
  replyingToId = msgId;
  editingId = null;

  const msg = getMsgById(msgId);
  const name = msg?.mine ? 'أنت' : 'الطرف الآخر';
  const text = buildReplyPreviewText(msg);

  replyPreview.classList.remove('hidden');
  replyPreview.innerHTML = `
    <div class="reply-preview-box">
      <div class="reply-preview-main">
        <div class="reply-preview-title">رد على ${escapeHtml(name)}</div>
        <div class="reply-preview-text">${escapeHtml(text)}</div>
      </div>
      <button class="reply-close" id="closeReplyBtn" type="button">×</button>
    </div>
  `;

  document.getElementById('closeReplyBtn').addEventListener('click', clearReplyPreview);
  requestAnimationFrame(syncLayoutHeights);
  input.focus();
}

function getMenuIconSvg(type) {
  if (type === 'copy') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="9" y="9" width="10" height="10" rx="2"></rect>
        <path d="M7 15H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v1"></path>
      </svg>
    `;
  }

  if (type === 'edit') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
      </svg>
    `;
  }

  if (type === 'delete') {
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 6h18"></path>
        <path d="M8 6V4h8v2"></path>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
      </svg>
    `;
  }

  return '';
}

function openMenu(msg) {
  menuTargetId = msg.id;
  menuHead.textContent = msg.mine ? 'خيارات رسالتك' : 'خيارات الرسالة';
  menuActions.innerHTML = '';

  menuMessagePreview.innerHTML = `
    <div class="preview-bubble ${msg.mine ? 'me' : 'other'}">
      <div class="preview-text">${escapeHtml(msg.text || '')}</div>
      <div class="preview-meta">${escapeHtml(msg.time || '')}</div>
    </div>
  `;

  const actions = [
    {
      label: 'نسخ',
      icon: 'copy',
      action: () => copyMessage(msg.id)
    }
  ];

  if (msg.mine) {
    actions.push(
      {
        label: 'تعديل',
        icon: 'edit',
        action: () => editMessage(msg.id)
      },
      {
        label: 'حذف',
        icon: 'delete',
        action: () => deleteMessage(msg.id),
        danger: true
      }
    );
  }

  actions.forEach(item => {
    const btn = document.createElement('button');
    btn.className = `menu-btn${item.danger ? ' danger' : ''}`;
    btn.type = 'button';
    btn.innerHTML = `
      <span class="menu-btn-label">
        <span class="menu-btn-icon">${getMenuIconSvg(item.icon)}</span>
        <span class="menu-btn-text">${item.label}</span>
      </span>
    `;
    btn.addEventListener('click', () => {
      closeMenu();
      item.action();
    });
    menuActions.appendChild(btn);
  });

  menuOverlay.style.display = 'flex';
}
function closeMenu() {
  menuOverlay.style.display = 'none';
  menuTargetId = null;
  menuMessagePreview.innerHTML = '';
}

function openAttachSheet() {
  attachOverlay.style.display = 'flex';
}

function closeAttachSheet() {
  attachOverlay.style.display = 'none';
}

function handlePickedFile(file, kindLabel) {
  if (!file) return;
  alert(`تم اختيار ${kindLabel}: ${file.name}`);
}

async function copyMessage(id) {
  const msg = getMsgById(id);
  if (!msg) return;
  try {
    await navigator.clipboard.writeText(msg.text || '');
  } catch {
    alert('تعذر النسخ');
  }
}

function editMessage(id) {
  const msg = getMsgById(id);
  if (!msg || !msg.mine) return;

  editingId = id;
  clearReplyPreview();
  input.value = msg.text;
  autoGrowTextarea();
  updateComposerActionButton();
  input.focus();
}

function deleteMessage(id) {
  const idx = data.findIndex(m => m.id === id);
  if (idx === -1) return;
  if (!confirm('هل تريد حذف الرسالة؟')) return;
  data.splice(idx, 1);
  renderMessages();
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  if (editingId) {
    const msg = getMsgById(editingId);
    if (msg) {
      msg.text = text;
      msg.edited = true;
    }
    editingId = null;
    input.value = '';
    autoGrowTextarea();
    updateComposerActionButton();
    renderMessages();
    return;
  }

  data.push({
    id: Date.now(),
    mine: true,
    text,
    time: new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' }),
    replyToId: replyingToId || null
  });

  input.value = '';
  autoGrowTextarea();
  updateComposerActionButton();
  clearReplyPreview();
  renderMessages();
}

function getPoint(e) {
  if (e.touches?.length) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.changedTouches?.length) {
    return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  }
  return { x: e.clientX || 0, y: e.clientY || 0 };
}

function clearLongPress() {
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
}

function resetSwipe(wrap) {
  if (!wrap) return;
  wrap.style.transform = 'translateX(0px)';
  wrap.classList.remove('swiping');
}

function handleSwipeMove(e, wrap) {
  if (!swipeTarget) return;

  const point = getPoint(e);
  const dx = point.x - pressStartX;
  const dy = Math.abs(point.y - pressStartY);

  if (dy > MOVE_CANCEL && !isSwiping) {
    clearLongPress();
    swipeTarget = null;
    resetSwipe(wrap);
    return;
  }

  if (dx > 0) {
    isSwiping = true;
    clearLongPress();
    const move = Math.min(dx, SWIPE_MAX);
    wrap.style.transform = `translateX(${move}px)`;
    wrap.classList.add('swiping');
  }
}

function handleSwipeEnd(wrap, msg) {
  clearLongPress();

  const matrix = new DOMMatrixReadOnly(getComputedStyle(wrap).transform);
  const movedX = matrix.m41 || 0;

  if (movedX >= SWIPE_REPLY_THRESHOLD) {
    openReplyPreview(msg.id);
    if (navigator.vibrate) navigator.vibrate(20);
  }

  resetSwipe(wrap);
  swipeTarget = null;
  isSwiping = false;
}

function bindInteractions(wrap, msg) {
  const start = (e) => {
    const target = e.target;
    if (target.closest('button') || target.closest('input') || target.closest('textarea')) return;

    const p = getPoint(e);
    pressStartX = p.x;
    pressStartY = p.y;
    swipeTarget = wrap;
    isSwiping = false;

    clearLongPress();
    longPressTimer = setTimeout(() => {
      suppressClickUntil = Date.now() + 600;
      openMenu(msg);
      if (navigator.vibrate) navigator.vibrate(18);
    }, LONG_PRESS_MS);
  };

  const move = (e) => handleSwipeMove(e, wrap);
  const end = () => handleSwipeEnd(wrap, msg);
  const cancel = () => {
    clearLongPress();
    resetSwipe(wrap);
    swipeTarget = null;
    isSwiping = false;
  };

  wrap.addEventListener('touchstart', start, { passive: true });
  wrap.addEventListener('touchmove', move, { passive: true });
  wrap.addEventListener('touchend', end);
  wrap.addEventListener('touchcancel', cancel);

  wrap.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    start(e);
  });
  wrap.addEventListener('mousemove', move);
  wrap.addEventListener('mouseup', end);
  wrap.addEventListener('mouseleave', cancel);

  wrap.addEventListener('contextmenu', (e) => e.preventDefault());
  wrap.addEventListener('dragstart', (e) => e.preventDefault());
  wrap.addEventListener('selectstart', (e) => e.preventDefault());

  wrap.addEventListener('click', (e) => {
    if (Date.now() < suppressClickUntil) {
      e.preventDefault();
      e.stopPropagation();
    }
  });
}

function hideKeyboard() {
  if (document.activeElement === input) {
    input.blur();
  }
}

messagesEl.addEventListener('touchstart', hideKeyboard, { passive: true });
messagesEl.addEventListener('click', hideKeyboard);

document.addEventListener('pointerdown', (e) => {
  if (document.activeElement !== input) return;
  if (e.target === input) return;
  if (e.target.closest('.composer-shell')) return;
  hideKeyboard();
});

function preventPageDragWhenTyping(e) {
  if (document.activeElement !== input) return;
  if (e.target.closest('.messages')) return;
  e.preventDefault();
}

document.addEventListener('touchmove', preventPageDragWhenTyping, { passive: false });
document.addEventListener('selectstart', (e) => {
  if (
    e.target.closest('.msg') ||
    e.target.closest('.msg-wrap') ||
    e.target.closest('.menu-overlay') ||
    e.target.closest('.menu-sheet') ||
    e.target.closest('.menu-btn') ||
    e.target.closest('.attach-overlay') ||
    e.target.closest('.attach-sheet') ||
    e.target.closest('.attach-option')
  ) {
    e.preventDefault();
  }
});

document.addEventListener('contextmenu', (e) => {
  if (
    e.target.closest('.msg') ||
    e.target.closest('.msg-wrap') ||
    e.target.closest('.menu-overlay') ||
    e.target.closest('.menu-sheet') ||
    e.target.closest('.menu-btn') ||
    e.target.closest('.attach-overlay') ||
    e.target.closest('.attach-sheet') ||
    e.target.closest('.attach-option')
  ) {
    e.preventDefault();
  }
});

attachBtn.addEventListener('click', () => {
  hideKeyboard();
  openAttachSheet();
});

attachOverlay.addEventListener('click', (e) => {
  if (e.target === attachOverlay) {
    closeAttachSheet();
  }
});

document.querySelectorAll('.attach-option').forEach(btn => {
  btn.addEventListener('click', () => {
    const kind = btn.dataset.kind;
    closeAttachSheet();

    if (kind === 'image') imagePicker.click();
    if (kind === 'video') videoPicker.click();
    if (kind === 'file') filePicker.click();
    if (kind === 'audio') audioPicker.click();
  });
});

imagePicker.addEventListener('change', () => {
  handlePickedFile(imagePicker.files?.[0], 'صورة');
  imagePicker.value = '';
});

videoPicker.addEventListener('change', () => {
  handlePickedFile(videoPicker.files?.[0], 'فيديو');
  videoPicker.value = '';
});

filePicker.addEventListener('change', () => {
  handlePickedFile(filePicker.files?.[0], 'ملف');
  filePicker.value = '';
});

audioPicker.addEventListener('change', () => {
  handlePickedFile(audioPicker.files?.[0], 'ملف صوت');
  audioPicker.value = '';
});
  
sendBtn.addEventListener('click', () => {
  const mode = sendBtn.dataset.mode;

  if (mode === 'send') {
    sendMessage();
    return;
  }

  alert('هنا لاحقًا سنربط تسجيل الصوت');
});

input.addEventListener('input', () => {
  autoGrowTextarea();
  updateComposerActionButton();
});
  
input.addEventListener('focus', () => {
  setTimeout(syncLayoutHeights, 60);
  setTimeout(syncLayoutHeights, 220);
});

input.addEventListener('blur', () => {
  setTimeout(syncLayoutHeights, 60);
});

menuOverlay.addEventListener('click', (e) => {
  if (e.target === menuOverlay) closeMenu();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMenu();
});

window.addEventListener('resize', syncLayoutHeights);
window.addEventListener('orientationchange', () => {
  setTimeout(syncLayoutHeights, 80);
});
window.visualViewport?.addEventListener('resize', syncLayoutHeights);
  
renderMessages();
autoGrowTextarea();
updateComposerActionButton();
syncLayoutHeights();
</script>

</body>
</html>
