<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الشات الخاص</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#1e293b;
      --mine:#2563eb;
      --other:#1e293b;
      --text:#ffffff;
      --muted:#94a3b8;
      --border:#334155;
      --danger:#ef4444;
      --ok:#10b981;
      --header:#1e293b;
      --bubble-radius:12px;
      --chat-font-size:15px;
      --panel-bg:#111827;
      --input-bg:#ffffff;
      --input-text:#111827;
      --selected-message:#334155;
      --actionbar-h:58px;
    }

    *{ box-sizing:border-box; }

    html, body{
      -webkit-text-size-adjust:100%;
      touch-action:manipulation;
    }

    body{
      font-family:tahoma,sans-serif;
      background:var(--bg);
      color:var(--text);
      margin:0;
      display:flex;
      flex-direction:column;
      height:100vh;
      overflow:hidden;
    }

    header{
      background:var(--header);
      padding:14px 16px;
      text-align:center;
      font-size:18px;
      border-bottom:1px solid var(--border);
      position:relative;
      flex-shrink:0;
      z-index:20;
    }

    .top-actions{
      position:absolute;
      left:12px;
      top:10px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .top-btn{
      background:#334155;
      color:#fff;
      border:none;
      border-radius:8px;
      padding:8px 10px;
      cursor:pointer;
      font-size:13px;
      width:auto;
      margin:0;
    }

    #selectionActionBar{
      display:none;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:var(--actionbar-h);
      background:var(--header);
      border-bottom:1px solid var(--border);
      padding:8px 12px;
      flex-shrink:0;
      z-index:30;
    }

    #selectionActionBar.active{
      display:flex;
    }

    .selection-side{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .selection-title{
      font-size:15px;
      font-weight:bold;
      white-space:nowrap;
    }

    .selection-count{
      font-size:13px;
      color:var(--muted);
    }

    .selection-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
      overflow:auto;
    }

    .selection-btn{
      border:none;
      background:#334155;
      color:#fff;
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      cursor:pointer;
      white-space:nowrap;
      min-width:auto;
      width:auto;
      flex-shrink:0;
    }

    .selection-btn.danger{
      background:#7f1d1d;
      color:#fff;
    }

    #statusBar{
      padding:10px 14px;
      font-size:14px;
      text-align:center;
      border-bottom:1px solid var(--border);
      background:#111827;
      color:var(--muted);
      flex-shrink:0;
    }

    #messages{
      flex:1;
      overflow:auto;
      padding:15px;
      display:flex;
      flex-direction:column;
      gap:10px;
      font-size:var(--chat-font-size);
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
      touch-action:pan-y;
    }

    .msg{
      max-width:78%;
      padding:10px 12px;
      border-radius:var(--bubble-radius);
      background:var(--other);
      align-self:flex-start;
      word-break:break-word;
      border:1px solid rgba(255,255,255,.04);
      box-shadow:0 2px 10px rgba(0,0,0,.12);
      position:relative;
      -webkit-user-select:none;
      user-select:none;
      -webkit-touch-callout:none;
      -webkit-tap-highlight-color:transparent;
      outline:none;
    }

    .msg.mine{
      background:var(--mine);
      align-self:flex-end;
    }

    .msg.selected{
      box-shadow:0 0 0 2px rgba(255,255,255,.18), 0 8px 22px rgba(0,0,0,.22);
      background:var(--selected-message);
    }

    .msg.mine.selected{
      filter:brightness(1.08);
    }

    .msg .name{
      font-size:12px;
      opacity:.9;
      margin-bottom:5px;
      font-weight:bold;
      pointer-events:none;
      -webkit-user-select:none;
      user-select:none;
    }

    .msg .content{
      pointer-events:none;
      -webkit-user-select:none;
      user-select:none;
    }

    .msg .meta{
      font-size:11px;
      opacity:.8;
      margin-top:6px;
      display:flex;
      gap:6px;
      align-items:center;
      flex-wrap:wrap;
      pointer-events:none;
      -webkit-user-select:none;
      user-select:none;
    }

    .msg .edited-badge{
      font-size:11px;
      opacity:.9;
    }

    .msg .attachment{
      display:block;
      margin-top:8px;
      max-width:min(340px, 100%);
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#0b1220;
      pointer-events:auto;
    }

    .msg img.attachment{
      max-height:360px;
      object-fit:cover;
      cursor:pointer;
    }

    .msg video.attachment{
      max-height:360px;
    }

    .msg audio.attachment{
      width:280px;
      max-width:100%;
      padding:6px;
    }

    .msg .attachment-placeholder{
      margin-top:8px;
      font-size:12px;
      opacity:.8;
      pointer-events:none;
    }

    .msg-reply-box{
      margin-bottom:8px;
      padding:8px 10px;
      border-radius:10px;
      background:rgba(255,255,255,.09);
      border-right:3px solid rgba(255,255,255,.55);
      font-size:12px;
      pointer-events:none;
      -webkit-user-select:none;
      user-select:none;
    }

    .msg-reply-name{
      font-weight:bold;
      margin-bottom:4px;
    }

    .msg-reply-text{
      opacity:.92;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    footer{
      display:flex;
      gap:10px;
      padding:10px;
      background:var(--card);
      border-top:1px solid var(--border);
      flex-shrink:0;
      align-items:center;
      flex-wrap:nowrap;
    }

    input[type="text"]{
      flex:1;
      padding:12px;
      border-radius:8px;
      border:none;
      outline:none;
      font-size:15px;
      background:var(--input-bg);
      color:var(--input-text);
      min-width:0;
    }

    button{
      padding:12px 16px;
      border:none;
      background:#2563eb;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
    }

    .ghost-btn{
      background:#334155;
      width:auto;
      white-space:nowrap;
      min-width:52px;
      font-size:20px;
      line-height:1;
      flex-shrink:0;
    }

    .recording-btn{
      background:#dc2626 !important;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{opacity:1}
      50%{opacity:.65}
      100%{opacity:1}
    }

    #attachmentInput{
      display:none;
    }

    #replyPreviewBox,
    #editPreviewBox,
    #attachmentPreviewBox{
      display:none;
      padding:8px 12px;
      background:#111827;
      border-top:1px solid var(--border);
      flex-shrink:0;
    }

    .attachment-chip,
    .reply-chip,
    .edit-chip{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      border-radius:12px;
      color:var(--muted);
      font-size:13px;
    }

    .attachment-chip .chip-main,
    .reply-chip .chip-main,
    .edit-chip .chip-main{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      min-width:0;
      flex:1;
    }

    .attachment-chip .chip-text,
    .reply-chip .chip-text,
    .edit-chip .chip-text{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:100%;
    }

    .attachment-chip audio{
      width:220px;
      max-width:100%;
    }

    .attachment-chip .remove,
    .reply-chip .remove,
    .edit-chip .remove{
      background:transparent;
      border:none;
      color:#fff;
      font-size:18px;
      cursor:pointer;
      width:auto;
      padding:0;
      margin:0;
      min-width:auto;
    }

    #loadingView{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .state-box{
      width:min(560px,100%);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:24px;
      text-align:center;
    }

    .hidden{
      display:none !important;
    }

    #settingsOverlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
    }

    #settingsPanel{
      width:min(520px,100%);
      max-height:90vh;
      overflow:auto;
      background:var(--panel-bg);
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }

    #settingsPanel h2{
      margin-top:0;
    }

    .setting-group{
      margin-bottom:18px;
      padding-bottom:14px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .setting-group:last-child{
      border-bottom:none;
    }

    .setting-group label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:14px;
    }

    .setting-group input,
    .setting-group select{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:#0b1220;
      color:#fff;
      outline:none;
    }

    .settings-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .preview-box{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:12px;
      padding:12px;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.06);
    }

    .preview-bubble{
      max-width:80%;
      padding:10px 12px;
      border-radius:var(--bubble-radius);
      font-size:var(--chat-font-size);
    }

    .preview-bubble.mine{
      background:var(--mine);
      align-self:flex-end;
    }

    .preview-bubble.other{
      background:var(--other);
      align-self:flex-start;
    }

    #mediaViewer{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.88);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:2000;
      padding:20px;
    }

    #mediaViewer img,
    #mediaViewer video{
      max-width:95vw;
      max-height:90vh;
      border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }

    @media (max-width:700px){
      .top-actions{
        position:static;
        justify-content:center;
        margin-top:10px;
      }

      header{
        padding-bottom:10px;
      }

      .settings-actions{
        grid-template-columns:1fr;
      }

      .msg{
        max-width:88%;
      }

      footer{
        flex-wrap:nowrap;
        gap:8px;
      }

      .ghost-btn, #send{
        width:auto;
      }

      .attachment-chip,
      .reply-chip,
      .edit-chip{
        align-items:flex-start;
      }

      .attachment-chip .chip-main,
      .reply-chip .chip-main,
      .edit-chip .chip-main{
        flex-direction:column;
        align-items:flex-start;
      }

      .selection-title{
        display:none;
      }

      .selection-btn{
        padding:10px 10px;
        font-size:13px;
      }
    }
  </style>
</head>
<body>

  <header id="mainHeader">
    الشات الخاص 🤍
    <div class="top-actions">
      <button id="settingsBtn" class="top-btn">الإعدادات</button>
      <button id="adminBtn" class="top-btn hidden">لوحة الأدمن</button>
      <button id="logoutBtn" class="top-btn">خروج</button>
    </div>
  </header>

  <div id="selectionActionBar">
    <div class="selection-side">
      <button id="cancelSelectionBtn" class="selection-btn">إلغاء</button>
      <div class="selection-title">خيارات الرسالة</div>
      <div class="selection-count" id="selectionCountText">1 محددة</div>
    </div>

    <div class="selection-actions">
      <button id="replyActionBtn" class="selection-btn">رد</button>
      <button id="copyActionBtn" class="selection-btn">نسخ</button>
      <button id="editActionBtn" class="selection-btn hidden">تعديل</button>
      <button id="deleteActionBtn" class="selection-btn danger hidden">حذف</button>
    </div>
  </div>

  <div id="statusBar">جاري التحقق من الجلسة...</div>

  <div id="loadingView">
    <div class="state-box">
      <h2 id="loadingTitle">جاري التحميل</h2>
      <p id="loadingText">لحظة من فضلك...</p>
    </div>
  </div>

  <div id="replyPreviewBox"></div>
  <div id="editPreviewBox"></div>
  <div id="attachmentPreviewBox"></div>

  <div id="messages" class="hidden"></div>

  <footer id="chatFooter" class="hidden">
    <input id="text" type="text" placeholder="اكتب رسالة..." autocomplete="off" />
    <input id="attachmentInput" type="file" accept="image/*,video/*,audio/*" />
    <button id="pickAttachmentBtn" class="ghost-btn" title="مرفق">📎</button>
    <button id="recordBtn" class="ghost-btn" title="تسجيل صوت">🎙️</button>
    <button id="send">إرسال</button>
  </footer>

  <div id="settingsOverlay">
    <div id="settingsPanel">
      <h2>إعدادات الشات</h2>

      <div class="setting-group">
        <label for="bgSelect">خلفية الشات</label>
        <select id="bgSelect">
          <option value="#0f172a">أزرق داكن</option>
          <option value="#111827">رمادي داكن</option>
          <option value="#0b1020">ليلي عميق</option>
          <option value="#1f2937">رمادي مزرق</option>
          <option value="#172554">كحلي</option>
          <option value="#3f3f46">رصاصي</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="mineColor">لون رسائلي</label>
        <input id="mineColor" type="color" value="#2563eb" />
      </div>

      <div class="setting-group">
        <label for="otherColor">لون رسائل الطرف الآخر</label>
        <input id="otherColor" type="color" value="#1e293b" />
      </div>

      <div class="setting-group">
        <label for="fontSize">حجم الخط</label>
        <select id="fontSize">
          <option value="14px">صغير</option>
          <option value="15px" selected>متوسط</option>
          <option value="16px">كبير</option>
          <option value="18px">أكبر</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="bubbleRadius">استدارة الفقاعات</label>
        <select id="bubbleRadius">
          <option value="8px">خفيفة</option>
          <option value="12px" selected>متوسطة</option>
          <option value="18px">ناعمة</option>
          <option value="24px">مستديرة جدًا</option>
        </select>
      </div>

      <div class="setting-group">
        <label>معاينة</label>
        <div class="preview-box">
          <div class="preview-bubble other">هذه رسالة تجريبية من الطرف الآخر</div>
          <div class="preview-bubble mine">وهذه رسالتك أنت</div>
        </div>
      </div>

      <div class="settings-actions">
        <button id="saveSettingsBtn">حفظ</button>
        <button id="resetSettingsBtn" class="top-btn" style="width:100%;background:#475569;">إعادة الافتراضي</button>
        <button id="closeSettingsBtn" class="top-btn" style="width:100%;background:#334155;">إغلاق</button>
      </div>
    </div>
  </div>

  <div id="mediaViewer"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const supabase = createClient(
    'https://vbwtsnxrshgjqmbgtagw.supabase.co',
    'sb_publishable_esJOtB6hRNf48Uo61txcyg_9F3yolJO'
  )

  const mainHeader = document.getElementById('mainHeader')
  const selectionActionBar = document.getElementById('selectionActionBar')
  const selectionCountText = document.getElementById('selectionCountText')
  const cancelSelectionBtn = document.getElementById('cancelSelectionBtn')
  const replyActionBtn = document.getElementById('replyActionBtn')
  const copyActionBtn = document.getElementById('copyActionBtn')
  const editActionBtn = document.getElementById('editActionBtn')
  const deleteActionBtn = document.getElementById('deleteActionBtn')

  const messagesBox = document.getElementById('messages')
  const input = document.getElementById('text')
  const sendBtn = document.getElementById('send')
  const chatFooter = document.getElementById('chatFooter')
  const loadingView = document.getElementById('loadingView')
  const loadingTitle = document.getElementById('loadingTitle')
  const loadingText = document.getElementById('loadingText')
  const statusBar = document.getElementById('statusBar')
  const logoutBtn = document.getElementById('logoutBtn')
  const adminBtn = document.getElementById('adminBtn')
  const settingsBtn = document.getElementById('settingsBtn')

  const settingsOverlay = document.getElementById('settingsOverlay')
  const bgSelect = document.getElementById('bgSelect')
  const mineColor = document.getElementById('mineColor')
  const otherColor = document.getElementById('otherColor')
  const fontSize = document.getElementById('fontSize')
  const bubbleRadius = document.getElementById('bubbleRadius')
  const saveSettingsBtn = document.getElementById('saveSettingsBtn')
  const resetSettingsBtn = document.getElementById('resetSettingsBtn')
  const closeSettingsBtn = document.getElementById('closeSettingsBtn')

  const attachmentInput = document.getElementById('attachmentInput')
  const pickAttachmentBtn = document.getElementById('pickAttachmentBtn')
  const recordBtn = document.getElementById('recordBtn')
  const attachmentPreviewBox = document.getElementById('attachmentPreviewBox')
  const replyPreviewBox = document.getElementById('replyPreviewBox')
  const editPreviewBox = document.getElementById('editPreviewBox')
  const mediaViewer = document.getElementById('mediaViewer')

  let currentUser = null
  let currentRole = 'member'
  let currentEmail = ''
  let renderedMessageIds = new Set()
  let accountStatusTimer = null
  let selectedAttachmentFile = null
  let selectedReplyMessageId = null
  let selectedEditMessageId = null
  let activeSelectedMessageId = null
  let mediaRecorder = null
  let mediaStream = null
  let recordedChunks = []
  let isRecording = false
  let realtimeChannel = null
  let longPressTimer = null
  let longPressStartPoint = null
  let longPressTriggered = false
  let suppressClickUntil = 0

  const LONG_PRESS_MS = 380
  const MOVE_CANCEL_THRESHOLD = 10

  const messageMap = new Map()
  const messageElementMap = new Map()

  const defaultSettings = {
    bg: '#0f172a',
    mine: '#2563eb',
    other: '#1e293b',
    fontSize: '15px',
    bubbleRadius: '12px'
  }

  function setStatus(text) {
    statusBar.textContent = text
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;')
  }

  function formatTime(iso) {
    const d = new Date(iso)
    return d.toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' })
  }

  function showChat() {
    loadingView.classList.add('hidden')
    messagesBox.classList.remove('hidden')
    chatFooter.classList.remove('hidden')
  }

  function hideChat() {
    messagesBox.classList.add('hidden')
    chatFooter.classList.add('hidden')
    loadingView.classList.remove('hidden')
  }

  function getDisplayNameFromEmail(email) {
    if (!email) return 'مستخدم'
    return email.split('@')[0]
  }

  function isNearBottom() {
    return messagesBox.scrollHeight - messagesBox.scrollTop - messagesBox.clientHeight < 120
  }

  function scrollToBottom() {
    messagesBox.scrollTop = messagesBox.scrollHeight
  }

  function getChatSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem('chat_settings_v1') || '{}')
      return { ...defaultSettings, ...saved }
    } catch {
      return { ...defaultSettings }
    }
  }

  function saveChatSettings(settings) {
    localStorage.setItem('chat_settings_v1', JSON.stringify(settings))
  }

  function applyChatSettings(settings) {
    document.documentElement.style.setProperty('--bg', settings.bg)
    document.documentElement.style.setProperty('--mine', settings.mine)
    document.documentElement.style.setProperty('--other', settings.other)
    document.documentElement.style.setProperty('--chat-font-size', settings.fontSize)
    document.documentElement.style.setProperty('--bubble-radius', settings.bubbleRadius)

    bgSelect.value = settings.bg
    mineColor.value = settings.mine
    otherColor.value = settings.other
    fontSize.value = settings.fontSize
    bubbleRadius.value = settings.bubbleRadius
  }

  function openSettings() {
    settingsOverlay.style.display = 'flex'
  }

  function closeSettings() {
    settingsOverlay.style.display = 'none'
  }

  function openMediaViewer(type, url) {
    if (type === 'image') {
      mediaViewer.innerHTML = `<img src="${url}" alt="صورة">`
    } else if (type === 'video') {
      mediaViewer.innerHTML = `<video src="${url}" controls autoplay playsinline></video>`
    } else {
      return
    }
    mediaViewer.style.display = 'flex'
  }

  function closeMediaViewer() {
    mediaViewer.innerHTML = ''
    mediaViewer.style.display = 'none'
  }

  function getAttachmentType(fileOrMime) {
    const value = String(fileOrMime || '')
    if (value.startsWith('image/')) return 'image'
    if (value.startsWith('video/')) return 'video'
    if (value.startsWith('audio/')) return 'audio'
    return 'unknown'
  }

  function getAttachmentLabel(type) {
    if (type === 'image') return '📷 صورة'
    if (type === 'video') return '🎬 فيديو'
    if (type === 'audio') return '🎵 صوت'
    return '📎 مرفق'
  }

  function getMessagePreviewText(msg) {
    if (!msg) return 'رسالة غير متوفرة'
    if (msg.content && String(msg.content).trim()) {
      return String(msg.content).trim()
    }
    if (msg.attachment_type) {
      return getAttachmentLabel(msg.attachment_type)
    }
    return 'رسالة'
  }

  function getMessageSenderName(msg) {
    if (!msg) return 'مستخدم'
    return msg.user_id === currentUser?.id ? 'أنت' : (msg.sender_name || 'مستخدم')
  }

  function updateAttachmentPreviewUI() {
    if (!selectedAttachmentFile) {
      attachmentPreviewBox.style.display = 'none'
      attachmentPreviewBox.innerHTML = ''
      return
    }

    const type = getAttachmentType(selectedAttachmentFile.type)
    let previewHtml = ''

    if (type === 'audio') {
      const audioUrl = URL.createObjectURL(selectedAttachmentFile)
      previewHtml = `<audio controls src="${audioUrl}"></audio>`
    }

    attachmentPreviewBox.style.display = 'block'
    attachmentPreviewBox.innerHTML = `
      <div class="attachment-chip">
        <div class="chip-main">
          <span class="chip-text">المرفق المختار: ${escapeHtml(selectedAttachmentFile.name)}</span>
          ${previewHtml}
        </div>
        <button class="remove" id="removeAttachmentBtn" title="إلغاء">×</button>
      </div>
    `

    document.getElementById('removeAttachmentBtn').addEventListener('click', clearSelectedAttachment)
  }

  function updateReplyPreviewUI() {
    if (!selectedReplyMessageId) {
      replyPreviewBox.style.display = 'none'
      replyPreviewBox.innerHTML = ''
      return
    }

    const msg = messageMap.get(selectedReplyMessageId)
    const senderName = getMessageSenderName(msg)
    const previewText = getMessagePreviewText(msg)

    replyPreviewBox.style.display = 'block'
    replyPreviewBox.innerHTML = `
      <div class="reply-chip">
        <div class="chip-main">
          <span class="chip-text">الرد على: ${escapeHtml(senderName)} — ${escapeHtml(previewText)}</span>
        </div>
        <button class="remove" id="removeReplyBtn" title="إلغاء الرد">×</button>
      </div>
    `

    document.getElementById('removeReplyBtn').addEventListener('click', clearReplySelection)
  }

  function updateEditPreviewUI() {
    if (!selectedEditMessageId) {
      editPreviewBox.style.display = 'none'
      editPreviewBox.innerHTML = ''
      sendBtn.textContent = 'إرسال'
      return
    }

    const msg = messageMap.get(selectedEditMessageId)
    editPreviewBox.style.display = 'block'
    editPreviewBox.innerHTML = `
      <div class="edit-chip">
        <div class="chip-main">
          <span class="chip-text">جارٍ تعديل الرسالة: ${escapeHtml(getMessagePreviewText(msg))}</span>
        </div>
        <button class="remove" id="removeEditBtn" title="إلغاء التعديل">×</button>
      </div>
    `

    sendBtn.textContent = 'حفظ'
    document.getElementById('removeEditBtn').addEventListener('click', clearEditSelection)
  }

  function clearSelectedAttachment() {
    selectedAttachmentFile = null
    attachmentInput.value = ''
    updateAttachmentPreviewUI()
  }

  function clearReplySelection() {
    selectedReplyMessageId = null
    updateReplyPreviewUI()
  }

  function clearEditSelection(resetInput = true) {
    selectedEditMessageId = null
    updateEditPreviewUI()
    if (resetInput) {
      input.value = ''
    }
  }

  function clearComposerModes(options = {}) {
    const { keepInput = false } = options
    clearReplySelection()
    clearEditSelection(!keepInput)
  }

  function stopMediaStreamTracks() {
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop())
      mediaStream = null
    }
  }

  function getPointFromEvent(event) {
    if (event.touches?.length) {
      return {
        x: event.touches[0].clientX,
        y: event.touches[0].clientY
      }
    }

    if (event.changedTouches?.length) {
      return {
        x: event.changedTouches[0].clientX,
        y: event.changedTouches[0].clientY
      }
    }

    return {
      x: event.clientX || 0,
      y: event.clientY || 0
    }
  }

  function clearLongPressTimer() {
    if (longPressTimer) {
      clearTimeout(longPressTimer)
      longPressTimer = null
    }
  }

  function updateSelectionActionBar() {
    const hasSelection = !!activeSelectedMessageId
    selectionActionBar.classList.toggle('active', hasSelection)
    mainHeader.style.display = hasSelection ? 'none' : ''
    selectionCountText.textContent = hasSelection ? '1 محددة' : '0'

    if (!hasSelection) {
      editActionBtn.classList.add('hidden')
      deleteActionBtn.classList.add('hidden')
      return
    }

    const msg = messageMap.get(activeSelectedMessageId)
    const isMine = msg?.user_id === currentUser?.id

    editActionBtn.classList.toggle('hidden', !isMine)
    deleteActionBtn.classList.toggle('hidden', !isMine)
  }

  function clearMessageSelection() {
    if (activeSelectedMessageId) {
      const prev = messageElementMap.get(activeSelectedMessageId)
      if (prev) prev.classList.remove('selected')
    }
    activeSelectedMessageId = null
    updateSelectionActionBar()
  }

  function selectMessage(messageId) {
    if (!messageMap.has(messageId)) return

    if (activeSelectedMessageId && activeSelectedMessageId !== messageId) {
      const prev = messageElementMap.get(activeSelectedMessageId)
      if (prev) prev.classList.remove('selected')
    }

    activeSelectedMessageId = messageId
    const bubble = messageElementMap.get(messageId)
    if (bubble) {
      bubble.classList.add('selected')
    }

    updateSelectionActionBar()
  }

  function beginLongPress(event, msgId) {
    const bubble = messageElementMap.get(msgId)
    if (!bubble) return

    const target = event.target
    if (
      target.closest('audio') ||
      target.closest('video') ||
      target.closest('img') ||
      target.closest('button') ||
      target.closest('a') ||
      target.closest('input') ||
      target.closest('textarea')
    ) {
      return
    }

    clearLongPressTimer()
    longPressTriggered = false
    longPressStartPoint = getPointFromEvent(event)

    longPressTimer = setTimeout(() => {
      longPressTriggered = true
      suppressClickUntil = Date.now() + 650
      selectMessage(msgId)
      if (navigator.vibrate) {
        navigator.vibrate(20)
      }
    }, LONG_PRESS_MS)
  }

  function cancelLongPress() {
    clearLongPressTimer()
    longPressStartPoint = null
  }

  function handleLongPressMove(event) {
    if (!longPressTimer || !longPressStartPoint) return

    const point = getPointFromEvent(event)
    const dx = Math.abs(point.x - longPressStartPoint.x)
    const dy = Math.abs(point.y - longPressStartPoint.y)

    if (dx > MOVE_CANCEL_THRESHOLD || dy > MOVE_CANCEL_THRESHOLD) {
      cancelLongPress()
    }
  }

  async function copyMessageText(messageId) {
    const msg = messageMap.get(messageId)
    if (!msg) return

    const textToCopy = msg.content?.trim() || getAttachmentLabel(msg.attachment_type)

    try {
      await navigator.clipboard.writeText(textToCopy || '')
      setStatus(`تم نسخ الرسالة | ${currentEmail} | الصلاحية: ${currentRole}`)
    } catch {
      alert('تعذر نسخ الرسالة')
    }
  }

  function startReplyToMessage(messageId) {
    if (!messageMap.has(messageId)) return
    if (selectedEditMessageId) {
      clearEditSelection()
    }
    selectedReplyMessageId = messageId
    updateReplyPreviewUI()
    clearMessageSelection()
    input.focus()
  }

  function startEditMessage(messageId) {
    const msg = messageMap.get(messageId)
    if (!msg) return
    if (msg.user_id !== currentUser.id) return
    if (selectedAttachmentFile) {
      clearSelectedAttachment()
    }
    clearReplySelection()
    selectedEditMessageId = messageId
    input.value = msg.content || ''
    updateEditPreviewUI()
    clearMessageSelection()
    input.focus()
  }

  async function deleteMessage(messageId) {
    const msg = messageMap.get(messageId)
    if (!msg) return
    if (msg.user_id !== currentUser.id) return

    const ok = confirm('هل تريد حذف هذه الرسالة؟')
    if (!ok) return

    try {
      const { error } = await supabase
        .from('chat_messages')
        .delete()
        .eq('id', messageId)
        .eq('user_id', currentUser.id)

      if (error) throw error

      if (selectedReplyMessageId === messageId) {
        clearReplySelection()
      }
      if (selectedEditMessageId === messageId) {
        clearEditSelection()
      }

      clearMessageSelection()
      setStatus(`تم حذف الرسالة | ${currentEmail} | الصلاحية: ${currentRole}`)
    } catch (err) {
      alert(err.message || 'تعذر حذف الرسالة')
    }
  }

  async function startRecording() {
    if (selectedAttachmentFile) {
      alert('ألغِ المرفق الحالي أولًا قبل بدء التسجيل')
      return
    }

    if (selectedEditMessageId) {
      alert('لا يمكن تسجيل مرفق صوتي أثناء تعديل رسالة')
      return
    }

    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true })
      mediaRecorder = new MediaRecorder(mediaStream)
      recordedChunks = []

      mediaRecorder.addEventListener('dataavailable', (event) => {
        if (event.data && event.data.size > 0) {
          recordedChunks.push(event.data)
        }
      })

      mediaRecorder.addEventListener('stop', () => {
        const mimeType = mediaRecorder.mimeType || 'audio/webm'
        const extension = mimeType.includes('ogg') ? 'ogg' : 'webm'
        const audioBlob = new Blob(recordedChunks, { type: mimeType })
        const fileName = `recording_${Date.now()}.${extension}`
        selectedAttachmentFile = new File([audioBlob], fileName, { type: mimeType })
        updateAttachmentPreviewUI()
        stopMediaStreamTracks()
      })

      mediaRecorder.start()
      isRecording = true
      recordBtn.textContent = '⏹️'
      recordBtn.classList.add('recording-btn')
      setStatus(`جاري تسجيل الصوت... | ${currentEmail} | الصلاحية: ${currentRole}`)
    } catch (err) {
      alert('تعذر الوصول إلى الميكروفون. تأكد من السماح للمتصفح باستخدامه.')
      stopMediaStreamTracks()
    }
  }

  function stopRecording() {
    if (!mediaRecorder || !isRecording) return
    mediaRecorder.stop()
    isRecording = false
    recordBtn.textContent = '🎙️'
    recordBtn.classList.remove('recording-btn')
    setStatus(`تم تجهيز التسجيل الصوتي | ${currentEmail} | الصلاحية: ${currentRole}`)
  }

  async function requireSession() {
    const { data, error } = await supabase.auth.getSession()
    if (error) throw error

    const user = data.session?.user
    if (!user || user.is_anonymous || !user.email) {
      window.location.href = 'login.html'
      throw new Error('لا توجد جلسة تسجيل دخول صالحة')
    }

    return user
  }

  async function getRole(userId) {
    const { data, error } = await supabase
      .from('user_roles')
      .select('role')
      .eq('id', userId)
      .maybeSingle()

    if (error) throw error
    return data?.role || 'member'
  }

  async function getMyAccountStatus() {
    const { data, error } = await supabase.rpc('get_my_account_status')
    if (error) throw error

    if (Array.isArray(data)) {
      return data[0] || null
    }

    return data || null
  }

  function isCurrentlyBanned(statusRow) {
    if (!statusRow || !statusRow.banned_until) return false
    return new Date(statusRow.banned_until).getTime() > Date.now()
  }

  async function enforceNotBanned() {
    const statusRow = await getMyAccountStatus()

    if (isCurrentlyBanned(statusRow)) {
      hideChat()
      loadingTitle.textContent = 'تم منع الوصول'
      loadingText.textContent = 'هذا الحساب محظور حاليًا ولا يمكنه استخدام الشات.'
      setStatus('الحساب محظور')
      input.disabled = true
      sendBtn.disabled = true
      clearSelectedAttachment()
      clearComposerModes()
      clearMessageSelection()
      if (isRecording) stopRecording()
      closeSettings()
      throw new Error('الحساب محظور')
    }

    input.disabled = false
    sendBtn.disabled = false
  }

  function startAccountStatusWatcher() {
    if (accountStatusTimer) {
      clearInterval(accountStatusTimer)
    }

    accountStatusTimer = setInterval(async () => {
      try {
        await enforceNotBanned()
      } catch {
        clearInterval(accountStatusTimer)
      }
    }, 15000)
  }

  async function createSignedAttachmentUrl(path) {
    const { data, error } = await supabase
      .storage
      .from('chat')
      .createSignedUrl(path, 3600)

    if (error) throw error
    return data?.signedUrl || ''
  }

  function sanitizeFileName(name) {
    return name.replace(/[^\w.\-]+/g, '_')
  }

  async function uploadAttachment(file) {
    const safeName = sanitizeFileName(file.name)
    const filePath = `${currentUser.id}/${Date.now()}_${safeName}`

    const { error } = await supabase
      .storage
      .from('chat')
      .upload(filePath, file, {
        cacheControl: '3600',
        upsert: false,
        contentType: file.type
      })

    if (error) throw error
    return filePath
  }

  function createReplyHtml(msg) {
    if (!msg.reply_to_id) return ''

    const repliedMsg = messageMap.get(msg.reply_to_id)
    const repliedName = getMessageSenderName(repliedMsg)
    const repliedText = getMessagePreviewText(repliedMsg)

    return `
      <div class="msg-reply-box">
        <div class="msg-reply-name">${escapeHtml(repliedName)}</div>
        <div class="msg-reply-text">${escapeHtml(repliedText)}</div>
      </div>
    `
  }

  function buildMessageInnerHtml(msg) {
    return `
      <div class="name">${escapeHtml(getMessageSenderName(msg))}</div>
      ${createReplyHtml(msg)}
      ${msg.content ? `<div class="content">${escapeHtml(msg.content)}</div>` : ''}
      <div class="attachment-placeholder hidden">جاري تحميل المرفق...</div>
      <div class="meta">
        <span>${formatTime(msg.created_at)}</span>
        ${msg.updated_at ? '<span class="edited-badge">(تم التعديل)</span>' : ''}
      </div>
    `
  }

  async function loadAttachmentIntoBubble(msg, bubble) {
    if (!(msg.attachment_path && msg.attachment_type)) return

    const placeholder = bubble.querySelector('.attachment-placeholder')
    if (!placeholder) return

    placeholder.classList.remove('hidden')

    try {
      const signedUrl = await createSignedAttachmentUrl(msg.attachment_path)

      if (msg.attachment_type === 'image') {
        const img = document.createElement('img')
        img.className = 'attachment'
        img.src = signedUrl
        img.alt = 'صورة'
        img.loading = 'lazy'
        img.draggable = false
        img.addEventListener('click', () => openMediaViewer('image', signedUrl))
        img.addEventListener('contextmenu', (e) => e.preventDefault())
        placeholder.replaceWith(img)
      } else if (msg.attachment_type === 'video') {
        const video = document.createElement('video')
        video.className = 'attachment'
        video.src = signedUrl
        video.controls = true
        video.preload = 'metadata'
        video.playsInline = true
        video.addEventListener('click', () => openMediaViewer('video', signedUrl))
        video.addEventListener('contextmenu', (e) => e.preventDefault())
        placeholder.replaceWith(video)
      } else if (msg.attachment_type === 'audio') {
        const audio = document.createElement('audio')
        audio.className = 'attachment'
        audio.src = signedUrl
        audio.controls = true
        audio.preload = 'metadata'
        audio.addEventListener('contextmenu', (e) => e.preventDefault())
        placeholder.replaceWith(audio)
      } else {
        placeholder.textContent = 'نوع مرفق غير مدعوم'
      }
    } catch {
      placeholder.textContent = 'تعذر تحميل المرفق'
    }
  }

  function bindMessageInteractions(msgId, bubble) {
    bubble.addEventListener('touchstart', (e) => beginLongPress(e, msgId), { passive: true })
    bubble.addEventListener('touchmove', handleLongPressMove, { passive: true })
    bubble.addEventListener('touchend', cancelLongPress)
    bubble.addEventListener('touchcancel', cancelLongPress)

    bubble.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return
      beginLongPress(e, msgId)
    })

    bubble.addEventListener('mousemove', handleLongPressMove)
    bubble.addEventListener('mouseup', cancelLongPress)
    bubble.addEventListener('mouseleave', cancelLongPress)

    bubble.addEventListener('contextmenu', (e) => {
      e.preventDefault()
    })

    bubble.addEventListener('selectstart', (e) => {
      e.preventDefault()
    })

    bubble.addEventListener('dragstart', (e) => {
      e.preventDefault()
    })

    bubble.addEventListener('click', (e) => {
      if (Date.now() < suppressClickUntil) {
        e.preventDefault()
        e.stopPropagation()
      }
    })
  }

  async function renderMessage(msg) {
    if (msg?.id && renderedMessageIds.has(msg.id)) return
    if (msg?.id) renderedMessageIds.add(msg.id)
    if (msg?.id) messageMap.set(msg.id, msg)

    const div = document.createElement('div')
    div.className = 'msg'
    div.dataset.messageId = String(msg.id || '')
    div.setAttribute('tabindex', '-1')
    if (msg.user_id === currentUser.id) {
      div.classList.add('mine')
    }

    div.innerHTML = buildMessageInnerHtml(msg)
    messagesBox.appendChild(div)

    if (msg?.id) {
      messageElementMap.set(msg.id, div)
      bindMessageInteractions(msg.id, div)
    }

    await loadAttachmentIntoBubble(msg, div)
  }

  async function updateRenderedMessage(msg) {
    if (!msg?.id) return
    messageMap.set(msg.id, msg)

    const bubble = messageElementMap.get(msg.id)
    if (!bubble) {
      await renderMessage(msg)
      return
    }

    const wasSelected = bubble.classList.contains('selected')
    const existingMedia = bubble.querySelector('.attachment')
    bubble.innerHTML = buildMessageInnerHtml(msg)

    if (existingMedia && msg.attachment_path && msg.attachment_type) {
      const placeholder = bubble.querySelector('.attachment-placeholder')
      if (placeholder) {
        placeholder.replaceWith(existingMedia)
      }
    } else {
      await loadAttachmentIntoBubble(msg, bubble)
    }

    if (wasSelected) {
      bubble.classList.add('selected')
    }
  }

  function removeRenderedMessage(messageId) {
    const bubble = messageElementMap.get(messageId)
    if (bubble) {
      bubble.remove()
    }

    renderedMessageIds.delete(messageId)
    messageElementMap.delete(messageId)
    messageMap.delete(messageId)

    if (selectedReplyMessageId === messageId) {
      clearReplySelection()
    }
    if (selectedEditMessageId === messageId) {
      clearEditSelection()
    }
    if (activeSelectedMessageId === messageId) {
      clearMessageSelection()
    }
  }

  async function loadMessages() {
    const { data, error } = await supabase
      .from('chat_messages')
      .select('*')
      .order('created_at', { ascending: true })

    if (error) throw error

    messagesBox.innerHTML = ''
    renderedMessageIds.clear()
    messageMap.clear()
    messageElementMap.clear()

    for (const msg of data) {
      if (msg?.id != null) {
        messageMap.set(msg.id, msg)
      }
    }

    for (const msg of data) {
      await renderMessage(msg)
    }

    scrollToBottom()
  }

  async function sendMessage() {
    const text = input.value.trim()
    const file = selectedAttachmentFile

    if (selectedEditMessageId) {
      if (!text) {
        alert('لا يمكن حفظ رسالة فارغة')
        return
      }

      sendBtn.disabled = true
      pickAttachmentBtn.disabled = true
      recordBtn.disabled = true

      try {
        await enforceNotBanned()

        const targetMsg = messageMap.get(selectedEditMessageId)
        if (!targetMsg || targetMsg.user_id !== currentUser.id) {
          throw new Error('لا يمكنك تعديل هذه الرسالة')
        }

        const { error } = await supabase
          .from('chat_messages')
          .update({
            content: text
          })
          .eq('id', selectedEditMessageId)
          .eq('user_id', currentUser.id)

        if (error) throw error

        input.value = ''
        clearEditSelection(false)
        setStatus(`تم تعديل الرسالة | ${currentEmail} | الصلاحية: ${currentRole}`)
      } catch (err) {
        alert(err.message || 'تعذر تعديل الرسالة')
      } finally {
        sendBtn.disabled = false
        pickAttachmentBtn.disabled = false
        recordBtn.disabled = false
        updateEditPreviewUI()
      }
      return
    }

    if (!text && !file) return

    try {
      await enforceNotBanned()
    } catch {
      return
    }

    let attachmentType = null
    if (file) {
      attachmentType = getAttachmentType(file.type)

      if (attachmentType === 'unknown') {
        alert('النوع المدعوم فقط: صورة أو فيديو أو صوت')
        return
      }

      if (file.size > 20 * 1024 * 1024) {
        alert('حجم المرفق يجب أن يكون أقل من 20MB')
        return
      }
    }

    sendBtn.disabled = true
    pickAttachmentBtn.disabled = true
    recordBtn.disabled = true

    try {
      let attachmentPath = null

      if (file) {
        attachmentPath = await uploadAttachment(file)
      }

      const { error } = await supabase
        .from('chat_messages')
        .insert({
          user_id: currentUser.id,
          content: text || null,
          sender_name: getDisplayNameFromEmail(currentEmail),
          attachment_path: attachmentPath,
          attachment_type: attachmentType,
          reply_to_id: selectedReplyMessageId || null
        })

      if (error) throw error

      input.value = ''
      clearSelectedAttachment()
      clearReplySelection()
    } catch (err) {
      alert(err.message || 'تعذر إرسال الرسالة')
    } finally {
      sendBtn.disabled = false
      pickAttachmentBtn.disabled = false
      recordBtn.disabled = false
    }
  }

  async function initRealtime() {
    if (realtimeChannel) {
      await supabase.removeChannel(realtimeChannel)
    }

    realtimeChannel = supabase
      .channel('chat_messages_live_v11')
      .on(
        'postgres_changes',
        {
          event: 'INSERT',
          schema: 'public',
          table: 'chat_messages'
        },
        async (payload) => {
          const shouldScroll = isNearBottom()
          await renderMessage(payload.new)
          if (shouldScroll) {
            scrollToBottom()
          }
        }
      )
      .on(
        'postgres_changes',
        {
          event: 'UPDATE',
          schema: 'public',
          table: 'chat_messages'
        },
        async (payload) => {
          await updateRenderedMessage(payload.new)
        }
      )
      .on(
        'postgres_changes',
        {
          event: 'DELETE',
          schema: 'public',
          table: 'chat_messages'
        },
        async (payload) => {
          removeRenderedMessage(payload.old.id)
        }
      )
      .subscribe()
  }

  async function logout() {
    if (accountStatusTimer) {
      clearInterval(accountStatusTimer)
    }
    if (isRecording) {
      stopRecording()
    }
    stopMediaStreamTracks()
    clearComposerModes()
    clearMessageSelection()
    await supabase.auth.signOut()
    window.location.href = 'login.html'
  }

  function handleSaveSettings() {
    const settings = {
      bg: bgSelect.value,
      mine: mineColor.value,
      other: otherColor.value,
      fontSize: fontSize.value,
      bubbleRadius: bubbleRadius.value
    }

    saveChatSettings(settings)
    applyChatSettings(settings)
    closeSettings()
    setStatus(`تم حفظ الإعدادات | ${currentEmail} | الصلاحية: ${currentRole}`)
  }

  function handleResetSettings() {
    saveChatSettings(defaultSettings)
    applyChatSettings(defaultSettings)
    setStatus(`تمت إعادة الإعدادات الافتراضية | ${currentEmail} | الصلاحية: ${currentRole}`)
  }

  async function init() {
    try {
      applyChatSettings(getChatSettings())

      currentUser = await requireSession()
      currentEmail = currentUser.email || ''
      currentRole = await getRole(currentUser.id)

      await enforceNotBanned()

      setStatus(`تم تسجيل الدخول: ${currentEmail} | الصلاحية: ${currentRole}`)

      if (currentRole === 'admin') {
        adminBtn.classList.remove('hidden')
      }

      showChat()
      await loadMessages()
      await initRealtime()
      startAccountStatusWatcher()
    } catch (err) {
      console.error(err)
      if (String(err.message || '').includes('محظور')) return
      loadingText.textContent = err.message || 'حدث خطأ'
    }
  }

  sendBtn.addEventListener('click', sendMessage)

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      sendMessage()
    }
  })

  pickAttachmentBtn.addEventListener('click', () => {
    if (isRecording) return
    if (selectedEditMessageId) {
      alert('لا يمكن إرفاق ملف أثناء تعديل رسالة')
      return
    }
    attachmentInput.click()
  })

  attachmentInput.addEventListener('change', () => {
    selectedAttachmentFile = attachmentInput.files?.[0] || null
    updateAttachmentPreviewUI()
  })

  recordBtn.addEventListener('click', async () => {
    if (isRecording) {
      stopRecording()
    } else {
      await startRecording()
    }
  })

  cancelSelectionBtn.addEventListener('click', clearMessageSelection)

  replyActionBtn.addEventListener('click', () => {
    if (!activeSelectedMessageId) return
    startReplyToMessage(activeSelectedMessageId)
  })

  copyActionBtn.addEventListener('click', async () => {
    if (!activeSelectedMessageId) return
    await copyMessageText(activeSelectedMessageId)
    clearMessageSelection()
  })

  editActionBtn.addEventListener('click', () => {
    if (!activeSelectedMessageId) return
    startEditMessage(activeSelectedMessageId)
  })

  deleteActionBtn.addEventListener('click', async () => {
    if (!activeSelectedMessageId) return
    await deleteMessage(activeSelectedMessageId)
  })

  logoutBtn.addEventListener('click', logout)

  adminBtn.addEventListener('click', () => {
    window.location.href = 'admin.html'
  })

  settingsBtn.addEventListener('click', openSettings)
  closeSettingsBtn.addEventListener('click', closeSettings)
  saveSettingsBtn.addEventListener('click', handleSaveSettings)
  resetSettingsBtn.addEventListener('click', handleResetSettings)

  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) {
      closeSettings()
    }
  })

  mediaViewer.addEventListener('click', () => {
    closeMediaViewer()
  })

  messagesBox.addEventListener('contextmenu', (e) => {
    e.preventDefault()
  })

  messagesBox.addEventListener('selectstart', (e) => {
    e.preventDefault()
  })

  messagesBox.addEventListener('dragstart', (e) => {
    if (e.target.closest('.msg')) {
      e.preventDefault()
    }
  })

  document.addEventListener('touchend', () => {
    cancelLongPress()
  }, { passive: true })

  document.addEventListener('mouseup', () => {
    cancelLongPress()
  })

  document.addEventListener('selectionchange', () => {
    const sel = window.getSelection?.()
    if (!sel || sel.isCollapsed) return
    const anchorNode = sel.anchorNode
    const focusNode = sel.focusNode

    const anchorEl = anchorNode?.parentElement
    const focusEl = focusNode?.parentElement

    const insideMessage =
      anchorEl?.closest?.('.msg') ||
      focusEl?.closest?.('.msg')

    if (insideMessage) {
      try {
        sel.removeAllRanges()
      } catch {}
    }
  })

  document.addEventListener('click', (e) => {
    if (Date.now() < suppressClickUntil) {
      e.preventDefault()
      e.stopPropagation()
    }
  }, true)

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      clearMessageSelection()
    }
  })

  document.addEventListener('scroll', () => {
    cancelLongPress()
  }, true)

  init()
</script>

</body>
</html>
